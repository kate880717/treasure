<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>분리수거 대장</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&family=Nunito:wght@700;900&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Jua', sans-serif;
            background-color: #f0fdf4;
            /* emerald-50 */
            touch-action: none;
            user-select: none;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .star-btn {
            transition: all 0.2s;
        }

        .star-btn:hover {
            transform: scale(1.2);
        }

        .ripple {
            animation: ripple 1.5s infinite linear;
        }

        @keyframes ripple {
            0% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
            }

            70% {
                box-shadow: 0 0 0 20px rgba(239, 68, 68, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- Utility: Icons (SVG Strings via dangerouslySetInnerHTML) ---
        const Icons = {
            Speaker: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>`,
            SpeakerOff: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>`,
            Mic: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>`,
            Stop: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2" ry="2"></rect></svg>`,
            Refresh: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>`,
            Play: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>`
        };

        const Icon = ({ name, size = 24, className = "" }) => (
            <div
                className={`inline-flex justify-center items-center ${className}`}
                style={{ width: size, height: size }}
                dangerouslySetInnerHTML={{ __html: Icons[name] }}
            />
        );

        // --- Core Constants ---
        const ART_MATERIALS = [
            { id: 'm1', shape: 'circle', color: 'bg-blue-400', hex: '#60A5FA' },
            { id: 'm2', shape: 'square', color: 'bg-green-400', hex: '#4ADE80' },
            { id: 'm3', shape: 'triangle', color: 'bg-yellow-400', hex: '#FACC15' },
            { id: 'm4', shape: 'circle', color: 'bg-red-400', hex: '#F87171' }
        ];

        const BIN_TYPES = [
            { id: '종이류', name: '종이류', color: 'bg-yellow-100 border-yellow-400 text-yellow-800' },
            { id: '플라스틱류', name: '플라스틱류', color: 'bg-blue-100 border-blue-400 text-blue-800' },
            { id: '병류', name: '병류', color: 'bg-green-100 border-green-400 text-green-800' },
            { id: '캔류', name: '캔류', color: 'bg-gray-200 border-gray-400 text-gray-800' }
        ];

        // 백엔드(구글 앱스스크립트) URL 입력 (배포된 웹 앱 URL)
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyVERNJF2Gcw7AA15cL6FU5mdi2RG1GGrW_4-6-KXyBHy7kLuhUQd8OX4QxxIQXMaT7/exec";

        // --- Main App Component ---
        const App = () => {
            // Data State
            const [students, setStudents] = useState([]);
            const [problems, setProblems] = useState([]);

            // App State
            const [step, setStep] = useState(0);
            const [isLoading, setIsLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);

            // User State
            const [speakerEnabled, setSpeakerEnabled] = useState(false);
            const [studentName, setStudentName] = useState("");

            // Activity State
            const [collectedTrash, setCollectedTrash] = useState([]);
            const [seaTrash, setSeaTrash] = useState([]);
            const [popupTrash, setPopupTrash] = useState(null); // 팝업 설명용
            const [sortedTrash, setSortedTrash] = useState([]);
            const [canvasObjects, setCanvasObjects] = useState([]);

            // Record State
            const [preRecordData, setPreRecordData] = useState({ text: "", base64: null, url: null });
            const [postRecordData, setPostRecordData] = useState({ text: "", base64: null, url: null });
            const [stars, setStars] = useState(0);

            // --- Initialization ---
            useEffect(() => {
                if (GAS_URL && GAS_URL.startsWith("http")) {
                    fetch(GAS_URL)
                        .then(res => res.json())
                        .then(data => {
                            setStudents(data.students || []);
                            setProblems(data.problems || []);
                            setIsLoading(false);
                        })
                        .catch(err => {
                            console.error(err);
                            setStudents(['API에러_테스터']);
                            setProblems([
                                { id: 'bottle', name: '플라스틱 병', icon: '🍾', type: '플라스틱류', fact: '플라스틱 병은 500년 동안 썩지 않아요!', hex: '#60A5FA' },
                                { id: 'paper', name: '종이 박스', icon: '📦', type: '종이류', fact: '종이 박스를 재활용하면 나무를 지킬 수 있어요.', hex: '#FBBF24' }
                            ]);
                            setIsLoading(false);
                        });
                } else {
                    // Local test fallback (GAS_URL 안 넣었을 때)
                    setStudents(['홍길동', '김철수']);
                    setProblems([
                        { id: 'bottle', name: '플라스틱 병', icon: '🍾', type: '플라스틱류', fact: '플라스틱 병은 500년 동안 썩지 않아요!', hex: '#60A5FA' },
                        { id: 'paper', name: '종이 박스', icon: '📦', type: '종이류', fact: '종이 박스를 재활용하면 나무를 지킬 수 있어요.', hex: '#FBBF24' },
                        { id: 'vinyl', name: '비닐 봉투', icon: '🥡', type: '비닐류', fact: '비닐 봉투가 바다로 가면 거북이가 먹이로 착각해요.', hex: '#F87171' },
                        { id: 'can', name: '알루미늄 캔', icon: '🥫', type: '캔류', fact: '알루미늄 캔을 다시 녹이면 자전거가 될 수 있어요!', hex: '#94A3B8' }
                    ]);
                    setIsLoading(false);
                }
            }, []);

            // --- Audio & TTS System ---
            const stopSpeak = () => {
                if (window.speechSynthesis) window.speechSynthesis.cancel();
            };

            const speak = (text) => {
                if (!speakerEnabled) return;
                stopSpeak();

                const utterThis = new SpeechSynthesisUtterance(text);
                utterThis.rate = 1.0;
                utterThis.pitch = 1.2; // slightly higher pitch for friendly tone

                const setVoice = () => {
                    const voices = window.speechSynthesis.getVoices();
                    let voice = voices.find(v => v.lang.includes('ko') && v.name.includes('Google'));
                    if (!voice) voice = voices.find(v => v.lang.includes('ko'));
                    if (voice) utterThis.voice = voice;
                    window.speechSynthesis.speak(utterThis);
                };

                if (window.speechSynthesis.getVoices().length === 0) {
                    window.speechSynthesis.onvoiceschanged = setVoice;
                } else {
                    setVoice();
                }
            };

            const playSoundEffect = (type) => {
                if (!speakerEnabled) return;
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);

                    if (type === 'correct') {
                        oscillator.type = 'sine';
                        oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                        oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5
                        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
                        oscillator.start();
                        oscillator.stop(audioCtx.currentTime + 0.5);
                    } else if (type === 'wrong') {
                        oscillator.type = 'sawtooth';
                        oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
                        oscillator.frequency.setValueAtTime(200, audioCtx.currentTime + 0.2);
                        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.4);
                        oscillator.start();
                        oscillator.stop(audioCtx.currentTime + 0.4);
                    }
                } catch (e) {
                    console.log("AudioContext not supported or blocked");
                }
            };

            // Auto-speak on step change
            useEffect(() => {
                if (!speakerEnabled) return;
                let text = "";
                switch (step) {
                    case 0: text = "안녕하세요! 이름을 선택하고 스피커를 켜주세요."; break;
                    case 1: text = "분리수거란 무엇일까요? 마이크 버튼을 눌러 생각을 말해주세요."; break;
                    case 2: text = "바다에 쓰레기가 많아요! 모두 주워주세요."; break;
                    case 3: text = "주운 쓰레기들을 알맞은 곳에 분리해서 정리해주세요."; break;
                    case 4: text = "마법 센터! 쓰레기들이 멋진 미술 재료로 변신합니다!"; break;
                    case 5: text = "환경 앱으로 가 보기! 변신한 재료들로 나만의 작품을 만들어보세요."; break;
                    case 6: text = "활동을 마쳤습니다. 이제 분리수거에 대해 어떻게 생각하나요? 마이크를 눌러 말해주세요."; break;
                    case 7: text = "스스로 평가해 보세요! 별을 눌러 점수를 주세요."; break;
                }
                if (text) setTimeout(() => speak(text), 500);
            }, [step, speakerEnabled]);

            // --- Handlers ---
            const handleNextStep = () => {
                stopSpeak();
                setStep(prev => prev + 1);
            };

            const handleToggleSpeaker = () => {
                const next = !speakerEnabled;
                setSpeakerEnabled(next);
                if (next) {
                    speak("소리가 켜졌습니다!");
                } else {
                    stopSpeak();
                }
            };

            const startCollecting = () => {
                // Initialize sea trash
                const initial = problems.map((p, i) => ({
                    ...p,
                    uid: Date.now() + i,
                    x: Math.random() * 70 + 10,
                    y: Math.random() * 60 + 10,
                    rotation: Math.random() * 360
                }));
                setSeaTrash(initial);
                setCollectedTrash([]);
                handleNextStep();
            };

            const handleCollect = (trash) => {
                setSeaTrash(prev => prev.filter(t => t.uid !== trash.uid));
                setPopupTrash(trash);
                speak(trash.fact);
            };

            const closePopupAndContinue = () => {
                setCollectedTrash(prev => [...prev, popupTrash]);
                setPopupTrash(null);
            };

            const handleSort = (trash, targetBinId) => {
                if (trash.type === targetBinId) {
                    playSoundEffect('correct');
                    speak(`정답! ${trash.name}은 ${targetBinId}에 넣어야 해요.`);
                    setCollectedTrash(prev => prev.filter(t => t.uid !== trash.uid));
                    setSortedTrash(prev => [...prev, trash]);
                } else {
                    playSoundEffect('wrong');
                    speak(`아차! ${trash.name}은 ${targetBinId}가 아니에요.`);
                }
            };

            const saveAllData = () => {
                setIsSaving(true);
                const data = {
                    studentName,
                    preRecordText: preRecordData.text,
                    preRecordUrl: "",
                    postRecordText: postRecordData.text,
                    postRecordUrl: "",
                    stars
                };

                if (GAS_URL && GAS_URL.startsWith("http")) {
                    const uploadPromises = [];

                    if (preRecordData.base64) {
                        uploadPromises.push(
                            fetch(GAS_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                body: JSON.stringify({ action: 'uploadAudio', base64Data: preRecordData.base64, filename: `${studentName}_사전녹음.webm` })
                            }).then(res => res.json()).then(resData => ({ type: 'pre', url: resData.url }))
                        );
                    }

                    if (postRecordData.base64) {
                        uploadPromises.push(
                            fetch(GAS_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                body: JSON.stringify({ action: 'uploadAudio', base64Data: postRecordData.base64, filename: `${studentName}_사후녹음.webm` })
                            }).then(res => res.json()).then(resData => ({ type: 'post', url: resData.url }))
                        );
                    }

                    Promise.all(uploadPromises).then(results => {
                        results.forEach(r => {
                            if (r.type === 'pre') data.preRecordUrl = r.url;
                            if (r.type === 'post') data.postRecordUrl = r.url;
                        });

                        return fetch(GAS_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            body: JSON.stringify({ action: 'saveResult', resultData: data })
                        });
                    })
                        .then(res => res.json())
                        .then(resData => {
                            setIsSaving(false);
                            if (resData.success) {
                                alert("저장되었습니다! 활동을 종료합니다.");
                                window.location.reload();
                            } else {
                                alert("저장 실패: " + resData.error);
                            }
                        })
                        .catch(err => {
                            console.error(err);
                            alert("서버 연결에 실패했습니다.");
                            setIsSaving(false);
                        });
                } else {
                    // Local test fallback
                    setTimeout(() => {
                        setIsSaving(false);
                        alert("로컬 모드: 저장이 생략되었습니다. (GAS_URL을 입력해주세요)");
                        window.location.reload();
                    }, 1500);
                }
            };

            // --- Sub-Components ---
            const RecorderComponent = ({ onComplete, defaultText }) => {
                const [isRecording, setIsRecording] = useState(false);
                const [isProcessing, setIsProcessing] = useState(false);
                const [text, setText] = useState("");
                const textRef = useRef("");
                const mediaRecorderRef = useRef(null);
                const chunksRef = useRef([]);
                const recognitionRef = useRef(null);
                const timeoutRef = useRef(null);

                const startRecording = async () => {
                    stopSpeak();
                    setText("");
                    textRef.current = "";
                    chunksRef.current = [];
                    setIsProcessing(false);

                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        mediaRecorderRef.current = new MediaRecorder(stream);

                        mediaRecorderRef.current.ondataavailable = e => {
                            if (e.data.size > 0) chunksRef.current.push(e.data);
                        };

                        mediaRecorderRef.current.onstop = () => {
                            try {
                                const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
                                const reader = new FileReader();
                                reader.readAsDataURL(blob);
                                reader.onloadend = () => {
                                    if (timeoutRef.current) clearTimeout(timeoutRef.current);
                                    onComplete({ text: textRef.current, base64: reader.result });
                                };
                            } catch (err) {
                                console.error("Blob conversion error", err);
                                if (timeoutRef.current) clearTimeout(timeoutRef.current);
                                onComplete({ text: textRef.current, base64: null });
                            }
                            stream.getTracks().forEach(t => t.stop());
                        };

                        mediaRecorderRef.current.start();

                        // STT
                        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                            recognitionRef.current = new SpeechRecognition();
                            recognitionRef.current.lang = 'ko-KR';
                            recognitionRef.current.continuous = true;
                            recognitionRef.current.interimResults = true;

                            recognitionRef.current.onresult = (event) => {
                                let finalTranscript = '';
                                for (let i = event.resultIndex; i < event.results.length; ++i) {
                                    if (event.results[i].isFinal) {
                                        finalTranscript += event.results[i][0].transcript;
                                    }
                                }
                                if (finalTranscript) {
                                    setText(prev => {
                                        const newText = prev + " " + finalTranscript;
                                        textRef.current = newText;
                                        return newText;
                                    });
                                }
                            };

                            try { recognitionRef.current.start(); } catch (e) { console.error(e); }
                        }

                        setIsRecording(true);
                        speak("녹음을 시작합니다. 자유롭게 말해주세요.");
                    } catch (err) {
                        alert("마이크 권한이 필요하거나 기기에 마이크가 없습니다. 건너뛰기를 눌러주세요.");
                        console.error(err);
                    }
                };

                const stopRecording = () => {
                    setIsRecording(false);
                    setIsProcessing(true);

                    try {
                        if (mediaRecorderRef.current && mediaRecorderRef.current.state !== "inactive") {
                            mediaRecorderRef.current.stop();
                        } else {
                            // If MediaRecorder failed to start or already stopped, just move on
                            onComplete({ text: textRef.current, base64: null });
                            return;
                        }
                    } catch (e) {
                        console.error(e);
                        onComplete({ text: textRef.current, base64: null });
                        return;
                    }

                    try {
                        if (recognitionRef.current) recognitionRef.current.stop();
                    } catch (e) { console.error(e); }

                    // Safety fallback: if onloadend doesn't fire within 3 seconds, force next step
                    timeoutRef.current = setTimeout(() => {
                        onComplete({ text: textRef.current, base64: null });
                    }, 3000);
                };

                return (
                    <div className="flex flex-col items-center gap-6 w-full max-w-xl bg-white p-8 rounded-[2rem] shadow-xl border-4 border-green-100">
                        <h3 className="text-3xl font-bold text-green-800">{defaultText}</h3>

                        <div className="min-h-[120px] w-full bg-green-50 rounded-2xl p-6 border-2 border-dashed border-green-300 text-xl text-gray-700 flex items-center justify-center text-center">
                            {text || (isRecording ? "듣고 있어요..." : (isProcessing ? "저장 중..." : "여기에 말한 내용이 나타납니다."))}
                        </div>

                        <div className="flex gap-4">
                            {!isRecording && !isProcessing && (
                                <>
                                    <button onClick={startRecording} className="flex items-center gap-2 bg-red-500 text-white px-8 py-4 rounded-full text-2xl font-bold hover:bg-red-600 shadow-lg active:scale-95 transition-all">
                                        <Icon name="Mic" /> 녹음 시작
                                    </button>
                                    <button onClick={() => onComplete({ text: "", base64: null })} className="flex items-center gap-2 bg-gray-400 text-white px-8 py-4 rounded-full text-2xl font-bold hover:bg-gray-500 shadow-lg active:scale-95 transition-all">
                                        건너뛰기
                                    </button>
                                </>
                            )}
                            {isRecording && !isProcessing && (
                                <button onClick={stopRecording} className="flex items-center gap-2 bg-gray-800 text-white px-8 py-4 rounded-full text-2xl font-bold hover:bg-gray-900 shadow-lg ripple active:scale-95 transition-all">
                                    <Icon name="Stop" /> 녹음 완료 및 넘어가기
                                </button>
                            )}
                            {isProcessing && (
                                <button disabled className="flex items-center gap-2 bg-green-500 text-white px-8 py-4 rounded-full text-2xl font-bold shadow-lg opacity-70 cursor-wait">
                                    처리 중... 잠시만 기다려주세요
                                </button>
                            )}
                        </div>
                    </div>
                );
            };

            // --- Render Helpers ---
            if (isLoading) {
                return <div className="flex h-screen items-center justify-center text-3xl font-bold text-green-700">로딩 중...</div>;
            }

            return (
                <div className="flex flex-col h-screen w-full relative overflow-hidden bg-emerald-50">

                    {/* Header */}
                    <header className="h-20 bg-white shadow-sm flex items-center justify-between px-6 z-50 shrink-0 border-b-4 border-green-200">
                        <div className="text-2xl font-bold text-green-800">🌍 분리수거 대장</div>
                        <div className="flex items-center gap-4">
                            {studentName && <span className="bg-green-100 text-green-800 px-4 py-2 rounded-full font-bold">{studentName} 대장님</span>}
                            <button
                                onClick={handleToggleSpeaker}
                                className={`p-3 rounded-full transition-all ${speakerEnabled ? 'bg-blue-500 text-white shadow-lg shadow-blue-200' : 'bg-gray-200 text-gray-500'}`}
                            >
                                {speakerEnabled ? <Icon name="Speaker" /> : <Icon name="SpeakerOff" />}
                            </button>
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-1 relative overflow-hidden">
                        <AnimatePresence mode="wait">

                            {/* STEP 0: Intro */}
                            {step === 0 && (
                                <motion.div key="step0" className="absolute inset-0 flex flex-col items-center justify-center p-6 gap-8 bg-gradient-to-b from-green-50 to-green-100"
                                    initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }}>
                                    <div className="text-[100px] drop-shadow-xl animate-bounce">🌱</div>
                                    <div className="glass-panel p-10 rounded-[3rem] w-full max-w-md flex flex-col gap-6 text-center">
                                        <h2 className="text-4xl font-bold text-green-800">환영합니다!</h2>

                                        {(!GAS_URL || !GAS_URL.startsWith("http")) && (
                                            <div className="bg-red-100 text-red-600 p-4 rounded-xl text-sm font-bold animate-pulse">
                                                ⚠️ index.html의 코드 상단에 있는 GAS_URL이 설정되지 않았습니다! 로컬 테스트 모드로 실행됩니다.
                                            </div>
                                        )}

                                        <p className="text-xl text-gray-600">이름을 선택하고 분리수거 대장이 되어보세요.</p>

                                        <select
                                            className="w-full text-2xl p-4 rounded-2xl border-4 border-green-200 bg-white font-bold text-green-900 focus:outline-none focus:border-green-500"
                                            value={studentName}
                                            onChange={e => setStudentName(e.target.value)}
                                        >
                                            <option value="" disabled>이름을 선택하세요</option>
                                            {students.map(name => <option key={name} value={name}>{name}</option>)}
                                        </select>

                                        <button
                                            onClick={() => setStep(1)}
                                            disabled={!studentName}
                                            className="mt-4 w-full bg-green-500 text-white text-3xl font-bold py-5 rounded-full shadow-lg disabled:opacity-50 disabled:cursor-not-allowed hover:bg-green-600 active:scale-95 transition-all"
                                        >
                                            시작하기
                                        </button>
                                    </div>
                                </motion.div>
                            )}

                            {/* STEP 1: Pre-record */}
                            {step === 1 && (
                                <motion.div key="step1" className="absolute inset-0 flex flex-col items-center justify-center p-6 bg-gradient-to-b from-blue-50 to-indigo-50"
                                    initial={{ opacity: 0, x: 50 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -50 }}>
                                    <RecorderComponent
                                        defaultText="분리수거란 무엇일까요? 아는 대로 말해보세요!"
                                        onComplete={(data) => {
                                            setPreRecordData(data);
                                            startCollecting(); // Next step and init trash
                                        }}
                                    />
                                </motion.div>
                            )}

                            {/* STEP 2: Collect Trash */}
                            {step === 2 && (
                                <motion.div key="step2" className="absolute inset-0 bg-blue-300 relative overflow-hidden"
                                    initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>

                                    {/* Overlay Title */}
                                    <div className="absolute top-8 left-0 right-0 flex justify-center pointer-events-none z-10">
                                        <div className="bg-white/90 px-8 py-4 rounded-full text-3xl font-bold text-blue-800 shadow-xl border-4 border-white">
                                            모두 주워주세요! ({problems.length - seaTrash.length}/{problems.length})
                                        </div>
                                    </div>

                                    {/* Sea Trash Items */}
                                    {seaTrash.map(t => (
                                        <motion.button
                                            key={t.uid}
                                            onClick={() => handleCollect(t)}
                                            className="absolute hover:scale-110 active:scale-95 transition-transform flex flex-col items-center drop-shadow-2xl"
                                            style={{ left: `${t.x}%`, top: `${t.y}%` }}
                                            initial={{ scale: 0 }} animate={{ scale: 1 }}
                                        >
                                            <div className="text-[100px] mb-2">{t.icon}</div>
                                            <div className="bg-white/90 px-4 py-2 rounded-2xl text-xl font-bold text-gray-800 border-2 border-gray-200">
                                                {t.name}
                                            </div>
                                        </motion.button>
                                    ))}

                                    {/* Next Button when clear */}
                                    {seaTrash.length === 0 && !popupTrash && (
                                        <div className="absolute inset-0 flex items-center justify-center bg-black/40 z-20">
                                            <motion.button
                                                onClick={handleNextStep}
                                                className="bg-yellow-400 text-yellow-900 px-12 py-6 rounded-full text-4xl font-bold shadow-2xl border-4 border-white animate-bounce"
                                                initial={{ scale: 0 }} animate={{ scale: 1 }}
                                            >
                                                정리하러 가기!
                                            </motion.button>
                                        </div>
                                    )}

                                    {/* Popup Explanation */}
                                    <AnimatePresence>
                                        {popupTrash && (
                                            <motion.div className="absolute inset-0 flex items-center justify-center bg-black/60 z-50 p-6"
                                                initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
                                                <motion.div className="bg-white p-10 rounded-[3rem] shadow-2xl max-w-xl w-full text-center flex flex-col items-center gap-6 border-8 border-blue-400"
                                                    initial={{ scale: 0.8, y: 50 }} animate={{ scale: 1, y: 0 }}>
                                                    <div className="text-[120px] bg-blue-50 w-48 h-48 rounded-full flex items-center justify-center border-4 border-blue-200">
                                                        {popupTrash.icon}
                                                    </div>
                                                    <h3 className="text-4xl font-bold text-blue-900">{popupTrash.name}</h3>
                                                    <p className="text-2xl text-gray-700 leading-relaxed bg-gray-50 p-6 rounded-2xl">
                                                        {popupTrash.fact}
                                                    </p>
                                                    <button
                                                        onClick={closePopupAndContinue}
                                                        className="w-full bg-blue-500 text-white text-3xl font-bold py-5 rounded-full mt-4 hover:bg-blue-600 active:scale-95 transition-all shadow-lg"
                                                    >
                                                        주머니에 넣기
                                                    </button>
                                                </motion.div>
                                            </motion.div>
                                        )}
                                    </AnimatePresence>

                                </motion.div>
                            )}

                            {/* STEP 3: Sort Trash */}
                            {step === 3 && (
                                <motion.div key="step3" className="absolute inset-0 flex flex-col bg-emerald-50 p-6"
                                    initial={{ opacity: 0, x: 50 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -50 }}>
                                    <div className="text-center mb-8">
                                        <h2 className="text-4xl font-bold text-emerald-800">종이류, 플라스틱류, 병류, 캔류 분리해서 정리하기</h2>
                                        <p className="text-xl text-emerald-600 mt-2">쓰레기를 눌러서 알맞은 분리수거함을 골라주세요.</p>
                                    </div>

                                    <div className="flex-1 flex flex-col md:flex-row gap-8">
                                        {/* Items to sort */}
                                        <div className="flex-1 bg-white rounded-[3rem] p-8 shadow-inner border-4 border-emerald-100 flex flex-wrap content-start gap-4 overflow-y-auto">
                                            {collectedTrash.map(t => (
                                                <div key={t.uid} className="relative group">
                                                    <button
                                                        className="text-[80px] bg-gray-50 rounded-3xl w-32 h-32 flex items-center justify-center shadow-md border-2 border-gray-100 hover:scale-105 transition-transform"
                                                    >
                                                        {t.icon}
                                                    </button>
                                                    {/* Mini sorting menu on hover/click */}
                                                    <div className="absolute top-full left-1/2 -translate-x-1/2 mt-2 w-max bg-white p-3 rounded-2xl shadow-xl border-2 border-gray-200 opacity-0 group-hover:opacity-100 pointer-events-none group-hover:pointer-events-auto transition-opacity z-50 flex gap-2">
                                                        {BIN_TYPES.map(bin => (
                                                            <button
                                                                key={bin.id}
                                                                onClick={() => handleSort(t, bin.id)}
                                                                className={`px-4 py-2 rounded-xl text-lg font-bold border-2 ${bin.color} hover:brightness-95 active:scale-95`}
                                                            >
                                                                {bin.name}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                            {collectedTrash.length === 0 && (
                                                <div className="w-full h-full flex items-center justify-center text-3xl font-bold text-gray-400">
                                                    모두 분리수거 했어요!
                                                </div>
                                            )}
                                        </div>

                                        {/* Bins Display (Visual only) */}
                                        <div className="flex-1 grid grid-cols-2 gap-4">
                                            {BIN_TYPES.map(bin => (
                                                <div key={bin.id} className={`rounded-[3rem] border-4 p-6 flex flex-col items-center justify-center ${bin.color} opacity-80`}>
                                                    <div className="text-6xl mb-4">♻️</div>
                                                    <div className="text-3xl font-bold">{bin.name}</div>
                                                    <div className="text-xl mt-2 font-bold opacity-60">
                                                        {sortedTrash.filter(t => t.type === bin.id).length}개
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {collectedTrash.length === 0 && (
                                        <motion.button
                                            onClick={handleNextStep}
                                            className="absolute bottom-10 left-1/2 -translate-x-1/2 bg-yellow-400 text-yellow-900 px-12 py-6 rounded-full text-4xl font-bold shadow-2xl border-4 border-white animate-bounce z-50"
                                            initial={{ scale: 0 }} animate={{ scale: 1 }}
                                        >
                                            마법 센터로 가기!
                                        </motion.button>
                                    )}
                                </motion.div>
                            )}

                            {/* STEP 4: Magic Center */}
                            {step === 4 && (
                                <motion.div key="step4" className="absolute inset-0 bg-purple-100 flex flex-col items-center justify-center p-8"
                                    initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
                                    <h2 className="text-5xl font-bold text-purple-800 mb-12">마법 센터 ✨</h2>

                                    <div className="flex items-center gap-12">
                                        <div className="bg-white p-8 rounded-[3rem] shadow-xl grid grid-cols-2 gap-4 border-4 border-purple-200">
                                            {sortedTrash.slice(0, 4).map((t, i) => (
                                                <div key={i} className="text-[60px]">{t.icon}</div>
                                            ))}
                                        </div>

                                        <div className="text-6xl text-purple-400 animate-pulse">➡️</div>

                                        <motion.div
                                            className="bg-purple-600 p-12 rounded-full shadow-2xl border-8 border-purple-300 flex items-center justify-center"
                                            animate={{ rotate: 360 }}
                                            transition={{ duration: 3, repeat: Infinity, ease: "linear" }}
                                        >
                                            <Icon name="Refresh" size={100} className="text-white" />
                                        </motion.div>

                                        <div className="text-6xl text-purple-400 animate-pulse">➡️</div>

                                        <div className="bg-white p-8 rounded-[3rem] shadow-xl grid grid-cols-2 gap-4 border-4 border-purple-200">
                                            {ART_MATERIALS.map((m, i) => (
                                                <div key={i} className={`w-16 h-16 ${m.color} ${m.shape === 'circle' ? 'rounded-full' : 'rounded-xl'}`} />
                                            ))}
                                        </div>
                                    </div>

                                    <button
                                        onClick={handleNextStep}
                                        className="mt-20 bg-purple-600 text-white px-12 py-6 rounded-full text-3xl font-bold shadow-2xl hover:bg-purple-700 active:scale-95 transition-all animate-bounce"
                                    >
                                        환경앱으로 가 보기 (작품 만들기)
                                    </button>
                                </motion.div>
                            )}

                            {/* STEP 5: Canvas (Environment App) */}
                            {step === 5 && (
                                <motion.div key="step5" className="absolute inset-0 flex flex-col md:flex-row bg-slate-50"
                                    initial={{ opacity: 0, x: 50 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -50 }}>

                                    <div className="w-full md:w-80 bg-white shadow-xl flex flex-col p-6 z-10 border-r-4 border-slate-200">
                                        <h3 className="text-2xl font-bold text-slate-800 mb-6">마법 재료 상자</h3>
                                        <div className="grid grid-cols-2 gap-4">
                                            {ART_MATERIALS.map(mat => (
                                                <button
                                                    key={mat.id}
                                                    onClick={() => setCanvasObjects([...canvasObjects, { id: Date.now(), mat, x: Math.random() * 60 + 20, y: Math.random() * 60 + 20 }])}
                                                    className="aspect-square bg-slate-100 rounded-2xl flex items-center justify-center hover:bg-slate-200 active:scale-95 transition-all border-2 border-transparent hover:border-slate-300"
                                                >
                                                    <div className={`w-12 h-12 ${mat.color} ${mat.shape === 'circle' ? 'rounded-full' : 'rounded-xl'} shadow-inner`} />
                                                </button>
                                            ))}
                                        </div>
                                        <div className="mt-auto pt-6 border-t-2 border-dashed border-slate-200">
                                            <p className="text-lg text-slate-500 font-bold text-center mb-4">재료를 눌러 도화지에 올려보세요!</p>
                                            <button
                                                onClick={handleNextStep}
                                                className="w-full bg-green-500 text-white py-5 rounded-full text-2xl font-bold shadow-lg hover:bg-green-600 active:scale-95 transition-all"
                                            >
                                                작품 완성!
                                            </button>
                                        </div>
                                    </div>

                                    <div className="flex-1 relative bg-slate-100 overflow-hidden flex items-center justify-center p-8">
                                        <div className="w-full max-w-2xl aspect-[4/3] bg-white rounded-[3rem] shadow-2xl border-8 border-white relative overflow-hidden">
                                            {/* Background Texture */}
                                            <div className="absolute inset-0 opacity-5 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4IiBoZWlnaHQ9IjgiPgo8cmVjdCB3aWR0aD0iOCIgaGVpZ2h0PSI4IiBmaWxsPSIjZmZmIj48L3JlY3Q+CjxwYXRoIGQ9Ik0wIDBMOCA4Wk04IDBMMCA4WiIgc3Ryb2tlPSIjMDAwIiBzdHJva2Utd2lkdGg9IjEiPjwvcGF0aD4KPC9zdmc+')] pointer-events-none" />

                                            {canvasObjects.length === 0 && (
                                                <div className="absolute inset-0 flex items-center justify-center text-3xl font-bold text-slate-300 pointer-events-none">
                                                    여기에 멋진 상상을 그려보세요
                                                </div>
                                            )}

                                            {canvasObjects.map(obj => (
                                                <motion.div
                                                    key={obj.id}
                                                    drag
                                                    dragMomentum={false}
                                                    className="absolute cursor-move flex items-center justify-center"
                                                    style={{ left: `${obj.x}%`, top: `${obj.y}%` }}
                                                >
                                                    <div className={`w-24 h-24 ${obj.mat.color} ${obj.mat.shape === 'circle' ? 'rounded-full' : 'rounded-2xl'} shadow-lg border-4 border-white/50`} />
                                                </motion.div>
                                            ))}
                                        </div>
                                    </div>
                                </motion.div>
                            )}

                            {/* STEP 6: Post-record */}
                            {step === 6 && (
                                <motion.div key="step6" className="absolute inset-0 flex flex-col items-center justify-center p-6 bg-gradient-to-b from-green-50 to-teal-50"
                                    initial={{ opacity: 0, x: 50 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -50 }}>
                                    <RecorderComponent
                                        defaultText="활동을 마치고 분리수거에 대해 어떻게 생각하게 되었나요?"
                                        onComplete={(data) => {
                                            setPostRecordData(data);
                                            handleNextStep();
                                        }}
                                    />
                                </motion.div>
                            )}

                            {/* STEP 7: Self-Evaluation & Save */}
                            {step === 7 && (
                                <motion.div key="step7" className="absolute inset-0 flex flex-col items-center justify-center p-6 bg-orange-50"
                                    initial={{ opacity: 0, y: 50 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -50 }}>
                                    <div className="glass-panel p-12 rounded-[4rem] max-w-2xl w-full text-center border-8 border-orange-200">
                                        <h2 className="text-4xl font-bold text-orange-800 mb-4">스스로 평가해 볼까요?</h2>
                                        <p className="text-2xl text-orange-600 mb-10">별을 눌러 점수를 주세요!</p>

                                        <div className="flex justify-center gap-4 mb-12">
                                            {[1, 2, 3, 4, 5].map(num => (
                                                <button
                                                    key={num}
                                                    onClick={() => setStars(num)}
                                                    className={`star-btn text-[80px] leading-none ${num <= stars ? 'text-yellow-400 drop-shadow-lg' : 'text-gray-300 grayscale opacity-50'}`}
                                                >
                                                    ⭐
                                                </button>
                                            ))}
                                        </div>

                                        <div className="flex gap-4">
                                            {stars > 0 && stars <= 3 && (
                                                <button
                                                    onClick={() => window.location.reload()}
                                                    className="flex-1 bg-orange-500 text-white text-3xl font-bold py-6 rounded-full shadow-xl hover:bg-orange-600 active:scale-95 transition-all"
                                                >
                                                    다시 해보기
                                                </button>
                                            )}

                                            {(stars > 3 || (stars > 0 && stars <= 3)) && (
                                                <button
                                                    onClick={saveAllData}
                                                    disabled={isSaving}
                                                    className="flex-1 bg-green-500 text-white text-3xl font-bold py-6 rounded-full shadow-xl hover:bg-green-600 active:scale-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                                                >
                                                    {isSaving ? "저장 중..." : "완료 및 저장"}
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                </motion.div>
                            )}

                        </AnimatePresence>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
