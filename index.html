  <script>
    /* ─────────────────────────────────────────────
       GAS 웹앱 URL — GitHub Pages ↔ Google Sheets
       ───────────────────────────────────────────── */
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzMD-TZrAXntTnxuCd1eW0Y57o9y0RXX54j7TjO3Jfn4ORNOE8rBv6zlgBMCDuO1IwwtQ/exec";

    const gasGet = async (action) => {
      try {
        if (!GAS_URL) return null;
        const r = await fetch(`${GAS_URL}?action=${action}`, { redirect: 'follow' });
        return JSON.parse(await r.text());
      } catch (_) { return null; }
    };
    const gasPost = async (payload) => {
      try {
        if (!GAS_URL) return;
        await fetch(GAS_URL, {
          method: 'POST', mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(payload)
        });
      } catch (_) { }
    };

    /* 폴백 데이터 */
    const SAMPLES = ['김민준', '이하은', '박서준', '최지아', '정수아', '한지호'];

    const DEFAULT_STEPS = [
      {
        id: 1, title: '내가 좋아하는 것', desc: '내가 좋아하는 게 뭔지 알아볼까요? 💛', options: [
          { text: '그림 그리기', icon: '🎨', feedback: '그림 그리는 걸 좋아하는구나! 정말 멋져!' },
          { text: '노래 하기', icon: '🎤', feedback: '노래가 마음을 행복하게 해줘!' },
          { text: '친구랑 놀기', icon: '👫', feedback: '친구들과 함께라면 즐거워!' },
          { text: '맛있는 간식', icon: '🍩', feedback: '맛있는 걸 먹으면 기분이 좋아지지!' },
          { text: '블록 놀이', icon: '🧱', feedback: '블록으로 멋진 세상을 만드는구나!' },
          { text: '책 읽기', icon: '📚', feedback: '책 속엔 보물이 정말 많아!' },
          { text: '달리기', icon: '🏃', feedback: '씩씩하게 뛰는 모습이 멋져!' },
          { text: '춤추기', icon: '💃', feedback: '춤을 좋아하는구나! 몸이 리듬을 기억해!' },
        ]
      },
      {
        id: 2, title: '내가 잘하는 것', desc: '이번엔 내가 어떤 걸 잘하는지 찾아볼까요? 💪', options: [
          { text: '인사하기', icon: '🙇', feedback: '밝게 인사하는 모습이 예뻐!' },
          { text: '정리정돈', icon: '🧹', feedback: '스스로 정리하는 습관 훌륭해!' },
          { text: '달리기', icon: '🏃', feedback: '쌩쌩 잘 달리는구나!' },
          { text: '도와주기', icon: '🤝', feedback: '친구를 돕는 따뜻한 마음씨!' },
          { text: '발표하기', icon: '📢', feedback: '용기 있게 잘 말하는구나!' },
          { text: '골고루 먹기', icon: '🥗', feedback: '음식을 골고루 먹어서 튼튼하겠어!' },
          { text: '그림 그리기', icon: '🖼️', feedback: '예쁜 그림 솜씨를 가졌구나!' },
          { text: '줄넘기', icon: '➰', feedback: '줄넘기를 잘 하는구나!' },
        ]
      },
      {
        id: 3, title: '내가 되고 싶은 사람', desc: '앞으로 나는 어떤 사람이 되고 싶니? 🌟', options: [
          { text: '친절한 사람', icon: '🥰', feedback: '세상을 따뜻하게 만들 거야!' },
          { text: '씩씩한 사람', icon: '💪', feedback: '용감하게 이겨내는 멋진 사람!' },
          { text: '재미있는 사람', icon: '😄', feedback: '모두를 즐겁게 해줄 거야!' },
          { text: '똑똑한 사람', icon: '🎓', feedback: '문제를 척척 해결할 거야!' },
          { text: '건강한 사람', icon: '🌳', feedback: '몸도 마음도 튼튼한 사람!' },
          { text: '꿈을 이루는 사람', icon: '🌈', feedback: '멋진 꿈을 꼭 이룰 거야!' },
          { text: '친구가 많은 사람', icon: '👪', feedback: '많은 친구를 사귀는 사람!' },
          { text: '예술가', icon: '🎭', feedback: '세상을 아름답게 만들 거야!' },
        ]
      },
    ];

    /* ─────────────────────────────────────────────
       TTS — 자연스러운 Google/Neural 한국어 우선
       ───────────────────────────────────────────── */
    let cachedVoice = null;
    const pickKoreanVoice = () => {
      if (cachedVoice) return cachedVoice;
      const voices = window.speechSynthesis.getVoices();
      if (!voices.length) return null;

      // 1순위: Google 한국어 (클라우드 음성, 가장 자연스러움)
      let v = voices.find(v =>
        v.lang === 'ko-KR' &&
        v.name.toLowerCase().includes('google') &&
        !v.localService
      );
      // 2순위: Wavenet / Neural2 (Google Cloud)
      if (!v) v = voices.find(v =>
        v.lang === 'ko-KR' &&
        (v.name.includes('Wavenet') || v.name.includes('Neural'))
      );
      // 3순위: 자연스러움 키워드
      if (!v) v = voices.find(v =>
        v.lang === 'ko-KR' &&
        /wavenet|neural|premium|enhanced|natural/i.test(v.name)
      );
      // 4순위: Google 한국어 아무거나
      if (!v) v = voices.find(v => v.lang === 'ko-KR' && v.name.toLowerCase().includes('google'));
      // 5순위: ko-KR 아무거나
      if (!v) v = voices.find(v => v.lang === 'ko-KR');
      // 6순위: ko 아무거나
      if (!v) v = voices.find(v => v.lang && v.lang.startsWith('ko'));

      cachedVoice = v || null;
      return cachedVoice;
    };

    const speak = (text, on, opts = {}) => {
      if (!on || !window.speechSynthesis) return Promise.resolve();
      return new Promise((resolve) => {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'ko-KR';
        u.rate = opts.rate ?? 0.95;   // 자연스러운 속도
        u.pitch = opts.pitch ?? 1.0;  // 갈라짐 방지 — 기본 피치
        u.volume = opts.volume ?? 1;

        const go = () => {
          const v = pickKoreanVoice();
          if (v) u.voice = v;
          u.onend = () => resolve();
          u.onerror = () => resolve();
          if (opts.onBoundary) u.onboundary = opts.onBoundary;
          window.speechSynthesis.speak(u);
        };

        if (window.speechSynthesis.getVoices().length === 0) {
          window.speechSynthesis.onvoiceschanged = () => { go(); };
        } else {
          go();
        }
      });
    };

    /* 효과음 — 정답/오답/딸랑 */
    let audioCtx = null;
    const getCtx = () => {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    };
    const playTone = (freq, dur, vol = 0.12, type = 'sine') => {
      try {
        const ctx = getCtx();
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ctx.currentTime);
        gain.gain.setValueAtTime(vol, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + dur);
      } catch (_) { }
    };
    const playChime = (on) => {
      if (!on) return;
      try {
        const ctx = getCtx();
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.12, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.3);
      } catch (_) { }
    };
    const playCorrect = (on) => {
      if (!on) return;
      [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.15, 0.1), i * 80));
    };
    const playSticker = (on) => {
      if (!on) return;
      [659, 880, 1175].forEach((f, i) => setTimeout(() => playTone(f, 0.12, 0.1, 'triangle'), i * 60));
    };

    /* 칭찬 스티커 보상 — 별/하트/꽃 팡 터지기 */
    const burstStickers = (on) => {
      if (!on) return;
      const emojis = ['⭐', '💖', '🌸', '🌟', '💎', '🌺', '✨', '💛', '🎉', '🏆'];
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      for (let i = 0; i < 18; i++) {
        const el = document.createElement('div');
        el.className = 'reward-sticker';
        el.textContent = emojis[i % emojis.length];
        el.style.left = cx + 'px';
        el.style.top = cy + 'px';
        const angle = (Math.PI * 2 * i) / 18;
        const dist = 200 + Math.random() * 150;
        el.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
        el.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1300);
      }
    };

    /* STT — 실시간 음성 → 텍스트 */
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    /* ── 홈 버튼 아이콘 ── */

    /* ── 공통 헤더 ── */
    const Header = ({ label, soundOn, toggleSound, onHome, badge }) => (

          title={soundOn ? '소리 켜짐 (눌러서 끄기)' : '소리 꺼짐 (눌러서 켜기)'}>

    /* ── 별점 자기평가 ── */
    const StarRating = ({ value, onChange, label = "내 발표 별점은?" }) => (
      <div className="flex flex-col items-center gap-2">
        <p className="txt-lg font-black text-amber-800">{label}</p>
        <div className="flex gap-1">
          {[1, 2, 3, 4, 5].map(n => (
            <span key={n} onClick={() => onChange(n)}
              className={`star-btn ${value >= n ? 'active' : ''}`}>⭐</span>

        </div>
        {value > 0 && (
          <p className="txt-base font-bold text-amber-700">
            {value <= 3 ? '괜찮아요! 한번 더 도전해볼까요?' :
             value === 4 ? '잘했어요! 멋져요 💪' :

    /* ══════════════════════════════════════════════
       메인 앱
    ══════════════════════════════════════════════ */
    const App = () => {
      const [phase, setPhase] = useState('loading');
      const [students, setStudents] = useState([]);
      const [student, setStudent] = useState('');
      const [soundOn, setSoundOn] = useState(false); // 기본 OFF
      const [micReady, setMicReady] = useState(false);
      const [steps, setSteps] = useState([]);
      const [stepIdx, setStepIdx] = useState(0);
      const [myTreasures, setMyTreasures] = useState([]);
      const [picks, setPicks] = useState([]);
      const [isBoxOpen, setIsBoxOpen] = useState(false);
      const [flyItem, setFlyItem] = useState(null);
      const [showDone, setShowDone] = useState(false);
      const [customInput, setCustomInput] = useState('');

      // 발표 준비 체크리스트
      const [prepCheck, setPrepCheck] = useState({ posture: false, voice: false });

      // 녹음 + STT
      const [recStep, setRecStep] = useState('idle'); // idle | rec | done
      const [audioUrl, setAudioUrl] = useState(null);
      const [audioB64, setAudioB64] = useState(null);
      const [liveTranscript, setLiveTranscript] = useState('');
      const [finalTranscript, setFinalTranscript] = useState('');
      const [keyboardMode, setKeyboardMode] = useState(false);
      const [keyboardText, setKeyboardText] = useState('');

      // 도움받기
      const [helpCount, setHelpCount] = useState(0);
      const [helpHighlight, setHelpHighlight] = useState(-1); // 글자 인덱스
      const [showHelpExamples, setShowHelpExamples] = useState(false);

      // 자기평가
      const [selfStars, setSelfStars] = useState(0);
      const [reRecordCount, setReRecordCount] = useState(0);

      // 성찰
      const [reflectChoice, setReflectChoice] = useState(''); // 좋았던 점
      const [reflectStars, setReflectStars] = useState(0);    // 오늘 다짐 별점

      // 칭찬 스티커
      const [stickers, setStickers] = useState([]);

      // 저장
      const [saving, setSaving] = useState(false);
      const [saved, setSaved] = useState(false);

      const mrRef = useRef(null);
      const chunksRef = useRef([]);
      const permStreamRef = useRef(null);
      const recogRef = useRef(null);
      const audioPlayerRef = useRef(null);

      const currentStep = steps[stepIdx] || null;
      const likeItems = useMemo(() => myTreasures.filter(t => t.stepTitle === steps[0]?.title), [myTreasures, steps]);
      const skillItems = useMemo(() => myTreasures.filter(t => t.stepTitle === steps[1]?.title), [myTreasures, steps]);
      const dreamItems = useMemo(() => myTreasures.filter(t => t.stepTitle === steps[2]?.title), [myTreasures, steps]);

      // 발표 원고 — 3문장 카드
      const speechCards = useMemo(() => {
        const lk = likeItems.map(t => `${t.icon}${t.text}`).join(', ') || '아직 없어요';
        const sk = skillItems.map(t => `${t.icon}${t.text}`).join(', ') || '아직 없어요';
        const dr = dreamItems.map(t => `${t.icon}${t.text}`).join(', ') || '아직 없어요';
        return [
          { color: '#FCD34D', text: `안녕하세요! 저는 ${student}이에요.` },
          { color: '#86EFAC', text: `제가 좋아하는 것은 ${lk}이고, 제가 잘하는 것은 ${sk}이에요.` },
          { color: '#C4B5FD', text: `저는 앞으로 ${dr}이/가 되고 싶어요. 감사합니다!` },
        ];
      }, [student, likeItems, skillItems, dreamItems]);

      const speechFullText = speechCards.map(c => c.text).join(' ');

      // 도움받기 예시 문장 (저학년용 다양한 예시)
      const helpExamples = useMemo(() => [
        '안녕하세요! 저는 ○○○이에요. 만나서 반가워요!',
        '제가 좋아하는 것은 그림 그리기와 책 읽기예요.',
        '제가 잘하는 것은 인사하기예요. 친구들에게 큰 소리로 인사해요.',
        '저는 친절한 사람이 되고 싶어요. 친구를 도와주고 싶어요.',
        '저의 보물은 가족이에요. 가족이 있어서 행복해요.',
        '저는 그림을 잘 그려요. 그림 그리는 게 정말 즐거워요.',
        '저는 꿈을 꼭 이루고 싶어요. 매일 열심히 노력할 거예요.',
        '들어주셔서 감사합니다!',
      ], []);

      /* ── 마이크 권한: 시작시 1번만 ── */
      const requestMic = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          permStreamRef.current = stream;
          setMicReady(true);
          try { localStorage.setItem('treasure_micGranted', '1'); } catch (_) {}
        } catch (_) {
          alert('마이크 권한이 없어요. 브라우저 설정에서 허용해주세요.\n(녹음 없이도 키보드로 진행할 수 있어요!)');
        }
      };

      /* ── TTS 자동 안내 (스피커 ON일 때만) ── */
      useEffect(() => {
        if (!soundOn) return;
        if (phase === 'intro') speak('나만의 보물상자를 어떻게 채울까요? 총 세 단계의 미션이 있어요!', soundOn);
        if (phase === 'concept') speak('상자를 눌러서 보물을 확인해보세요!', soundOn);
        if (phase === 'stepPopup' && currentStep) speak(`${currentStep.title}. ${currentStep.desc}`, soundOn);
        if (phase === 'activity' && currentStep) speak(`${currentStep.title}. 마음껏 골라봐요!`, soundOn);
        if (phase === 'prepare') speak('발표 준비! 바른 자세를 했나요? 큰 소리로 또박또박 할 수 있나요?', soundOn);
        if (phase === 'recording') speak('이제 발표할 시간이에요. 원고를 보고 발표를 시작해봐요!', soundOn);
        if (phase === 'selfEval') speak('내 녹음을 들어보고 별점을 매겨봐요!', soundOn);
        if (phase === 'reflect') speak('오늘의 배움을 정리해볼까요?', soundOn);
      }, [phase, stepIdx, soundOn, currentStep]);

      /* ── 수료증 진입 시 confetti + 자동 저장 ── */
      useEffect(() => {
        if (phase !== 'report') return;
        confetti({ particleCount: 220, spread: 90, origin: { y: 0.6 } });
        burstStickers(soundOn);
        if (soundOn) speak('와! 보물상자가 가득 찼어요! 수료증을 받아봐요!', soundOn);
        if (!saved && GAS_URL) {
          setSaved(true); setSaving(true);
          const lk = likeItems.map(t => `${t.icon}${t.text}`);
          const sk = skillItems.map(t => `${t.icon}${t.text}`);
          const dr = dreamItems.map(t => `${t.icon}${t.text}`);
          gasPost({
            action: 'saveResult',
            data: {
              name: student,
              likes: lk, skills: sk, dreams: dr,
              audioBase64: audioB64,
              transcript: finalTranscript || keyboardText || '',
              inputMode: keyboardMode ? 'keyboard' : (audioB64 ? 'voice' : 'skipped'),
              helpCount: helpCount,
              selfStars: selfStars,
              reRecordCount: reRecordCount,
              stickerCount: stickers.length,
              reflectChoice: reflectChoice,
              reflectStars: reflectStars,
              prepPosture: prepCheck.posture,
              prepVoice: prepCheck.voice,
            }
          });
          setTimeout(() => setSaving(false), 800);
        }
      }, [phase]);

      /* ── 초기 데이터 로드 ── */
      useEffect(() => {
        if (window.speechSynthesis) {
          window.speechSynthesis.getVoices();
          window.speechSynthesis.onvoiceschanged = () => { cachedVoice = null; pickKoreanVoice(); };
        }
        // 마이크 권한 기록 복원
        try {
          if (localStorage.getItem('treasure_micGranted') === '1') {
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
              permStreamRef.current = stream; setMicReady(true);
            }).catch(() => {});
          }
        } catch (_) {}

        (async () => {
          let names = [...SAMPLES];
          let stepsData = DEFAULT_STEPS;
          if (GAS_URL) {
            const remoteStudents = await gasGet('getStudentList');
            if (Array.isArray(remoteStudents) && remoteStudents.length > 0) names = remoteStudents;
            const remoteQuiz = await gasGet('getQuizData');
            if (Array.isArray(remoteQuiz) && remoteQuiz.length > 0) stepsData = remoteQuiz;
          }
          setStudents(names);
          setStudent(names[0] || '');
          setSteps(stepsData);
          setPhase('start');
        })();
      }, []);

      /* ── 초기화 ── */
      const handleReset = useCallback(() => {
        setPhase('start');
        setStepIdx(0); setMyTreasures([]); setPicks([]);
        setIsBoxOpen(false); setFlyItem(null); setShowDone(false);
        setRecStep('idle'); setAudioUrl(null); setAudioB64(null);
        setLiveTranscript(''); setFinalTranscript(''); setKeyboardMode(false); setKeyboardText('');
        setHelpCount(0); setHelpHighlight(-1); setShowHelpExamples(false);
        setSelfStars(0); setReRecordCount(0); setStickers([]);
        setReflectChoice(''); setReflectStars(0);
        setPrepCheck({ posture: false, voice: false });
        setSaving(false); setSaved(false);
      }, []);

      /* ── 보물 선택 (다중 선택) ── */
      const handleSelect = useCallback((opt, e) => {
        const already = picks.find(p => p.text === opt.text);
        if (already) {
          setPicks(prev => prev.filter(p => p.text !== opt.text));
          if (soundOn) speak('선택 해제했어요', soundOn);
          return;
        }
        const rect = e?.currentTarget?.getBoundingClientRect() || { left: window.innerWidth/2, top: window.innerHeight/2, width: 0, height: 0 };
        setFlyItem({ ...opt, x: rect.left + rect.width/2, y: rect.top + rect.height/2 });
        setTimeout(() => setFlyItem(null), 1000);
        if (soundOn) { playChime(soundOn); setTimeout(() => speak(opt.feedback, soundOn), 350); }
        setPicks(prev => [...prev, { stepTitle: currentStep.title, ...opt }]);
      }, [picks, currentStep, soundOn]);

      const handleDoneSelecting = () => {
        if (picks.length === 0) {
          alert('적어도 하나는 골라주세요!');
          return;
        }
        setShowDone(true);
        playCorrect(soundOn);
        setTimeout(() => {
          const newAll = [...myTreasures, ...picks];
          setMyTreasures(newAll);
          setPicks([]);
          setShowDone(false);
          if (stepIdx >= steps.length - 1) {
            setPhase('prepare'); // 발표 준비 단계로
          } else {
            setStepIdx(i => i + 1);
            setPhase('stepPopup');
          }
        }, 1300);
      };

      /* ── 도움받기: 원고 읽어주기 + 글자 하이라이트 ── */
      const readSpeechWithHighlight = useCallback(() => {
        setHelpCount(c => c + 1);
        if (!soundOn) {
          // 스피커 꺼진 경우라도 글자 하이라이트는 진행 (시각 도움)
          let i = 0;
          setHelpHighlight(0);
          const timer = setInterval(() => {
            i++;
            if (i >= speechFullText.length) {
              clearInterval(timer); setHelpHighlight(-1);
            } else {
              setHelpHighlight(i);
            }
          }, 120);
          return;
        }
        speak(speechFullText, true, {
          rate: 0.85,
          onBoundary: (e) => {
            if (e.name === 'word' || e.name === 'sentence') setHelpHighlight(e.charIndex);
          }
        }).then(() => setHelpHighlight(-1));
      }, [soundOn, speechFullText]);

      const readExample = (text) => {
        setHelpCount(c => c + 1);
        if (soundOn) speak(text, true, { rate: 0.9 });
        else alert('🔊 소리를 켜면 읽어줄 수 있어요!\n\n예시 문장: ' + text);
      };

      /* ── 녹음 + 실시간 STT ── */
      const startRec = async () => {
        try {
          let stream = permStreamRef.current;
          if (!stream || stream.getAudioTracks().every(t => t.readyState === 'ended')) {
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            permStreamRef.current = stream;
          }
          // STT 시작
          if (SpeechRec) {
            const recog = new SpeechRec();
            recog.lang = 'ko-KR';
            recog.continuous = true;
            recog.interimResults = true;
            let finalT = '';
            recog.onresult = (ev) => {
              let interim = '';
              for (let i = ev.resultIndex; i < ev.results.length; i++) {
                if (ev.results[i].isFinal) finalT += ev.results[i][0].transcript + ' ';
                else interim += ev.results[i][0].transcript;
              }
              setLiveTranscript(finalT + interim);
              setFinalTranscript(finalT.trim());
            };
            recog.onerror = (e) => { console.log('STT 오류:', e.error); };
            recog.start();
            recogRef.current = recog;
          }
          // 녹음 시작
          const mr = new MediaRecorder(stream);
          mrRef.current = mr; chunksRef.current = [];
          mr.ondataavailable = e => { if (e.data.size > 0) chunksRef.current.push(e.data); };
          mr.onstop = () => {
            const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
            setAudioUrl(URL.createObjectURL(blob));
            const fr = new FileReader();
            fr.readAsDataURL(blob);
            fr.onloadend = () => { setAudioB64(fr.result.split(',')[1]); setRecStep('done'); };
          };
          mr.start();
          setRecStep('rec');
          setLiveTranscript('');
        } catch (_) {
          alert('마이크를 사용할 수 없어요!\n키보드로 입력해도 돼요 ⌨️');
        }
      };

      const stopRec = () => {
        if (mrRef.current?.state !== 'inactive') mrRef.current?.stop();
        if (recogRef.current) {
          try { recogRef.current.stop(); } catch (_) {}
          recogRef.current = null;
        }
      };

      const reRecord = () => {
        setRecStep('idle'); setAudioUrl(null); setAudioB64(null);
        setLiveTranscript(''); setFinalTranscript('');
        setReRecordCount(c => c + 1);
      };

      /* ── 칭찬 스티커 추가 ── */
      const addSticker = (kind) => {
        setStickers(prev => [...prev, kind]);
        burstStickers(true); // 스티커는 시각 효과 항상
        playSticker(soundOn);
      };

      const toggleSound = useCallback(() => setSoundOn(s => !s), []);

      /* ── 수료증 PNG ── */
      const downloadCert = useCallback(() => {
        const cv = document.createElement('canvas');
        cv.width = 1200; cv.height = 1700;
        const ctx = cv.getContext('2d');
        const grad = ctx.createLinearGradient(0, 0, 0, 1700);
        grad.addColorStop(0, '#FFFBEB'); grad.addColorStop(1, '#FEF3C7');
        ctx.fillStyle = grad; ctx.fillRect(0, 0, 1200, 1700);

        ctx.strokeStyle = '#B45309'; ctx.lineWidth = 28; ctx.strokeRect(28, 28, 1144, 1644);
        ctx.strokeStyle = '#FCD34D'; ctx.lineWidth = 10; ctx.strokeRect(50, 50, 1100, 1600);
        ctx.strokeStyle = '#B45309'; ctx.lineWidth = 5; ctx.strokeRect(68, 68, 1064, 1564);

        ctx.font = '55px serif'; ctx.textAlign = 'center';
        [[95, 105], [1105, 105], [95, 1650], [1105, 1650]].forEach(([x, y]) => ctx.fillText('🎁', x, y));

        ctx.fillStyle = '#78350F'; ctx.font = 'bold 70px sans-serif';
        ctx.fillText('✨ 나만의 보물상자 수료증 ✨', 600, 200);

        ctx.fillStyle = '#B45309'; ctx.font = 'bold 100px sans-serif';
        ctx.fillText(`🎖️  ${student}  🎖️`, 600, 340);

        ctx.fillStyle = '#92400E'; ctx.font = '48px sans-serif';
        ['위 학생은 나만의 보물상자를 채우고', '보물상자 발표를 훌륭히 마쳤으므로', '이 수료증을 드립니다. 🎉'].forEach((l, i) => ctx.fillText(l, 600, 450 + i * 70));

        const sections = [
          { label: '💛 내가 좋아하는 것', items: likeItems, y: 670, bg: '#FEFCE8', border: '#FCD34D', titleBg: '#FDE68A' },
          { label: '💪 내가 잘하는 것', items: skillItems, y: 980, bg: '#F0FDF4', border: '#86EFAC', titleBg: '#BBF7D0' },
          { label: '🌟 내가 되고 싶은 사람', items: dreamItems, y: 1290, bg: '#F5F3FF', border: '#C4B5FD', titleBg: '#DDD6FE' },
        ];
        sections.forEach(sec => {
          // 섹션 배경 (라운드)
          ctx.fillStyle = sec.bg;
          ctx.beginPath(); ctx.roundRect(100, sec.y, 1000, 270, 24); ctx.fill();
          ctx.strokeStyle = sec.border; ctx.lineWidth = 8;
          ctx.beginPath(); ctx.roundRect(100, sec.y, 1000, 270, 24); ctx.stroke();
          // 섹션 타이틀 배경
          ctx.fillStyle = sec.titleBg;
          ctx.beginPath(); ctx.roundRect(110, sec.y + 10, 980, 70, 18); ctx.fill();
          // 레이블
          ctx.fillStyle = '#1E293B'; ctx.font = 'bold 46px sans-serif'; ctx.textAlign = 'left';
          ctx.fillText(sec.label, 140, sec.y + 62);
          // 아이템
          ctx.font = '46px sans-serif'; ctx.fillStyle = '#374151';
          const itemsText = sec.items.map(it => `${it.icon} ${it.text}`).join(',  ');
          // 줄바꿈 처리
          const words = itemsText.split(',');
          let line = ''; let yy = sec.y + 140;
          words.forEach((w, i) => {
            const test = line + (i ? ',' : '') + w;
            if (ctx.measureText(test).width > 920 && line) {
              ctx.fillText(line, 140, yy); line = w; yy += 60;
            } else line = test;
          });
          if (line) ctx.fillText(line, 140, yy);
          ctx.textAlign = 'center';
        });

        ctx.fillStyle = '#9CA3AF'; ctx.font = 'bold 38px sans-serif';
        ctx.fillText(new Date().toLocaleDateString('ko-KR'), 600, 1620);

        const a = document.createElement('a');
        a.download = `보물상자수료증_${student}.png`;
        a.href = cv.toDataURL('image/png'); a.click();
      }, [student, likeItems, skillItems, dreamItems]);

      /* ═══════════════════════════════════════════════════
         화면 렌더링
      ═══════════════════════════════════════════════════ */

      /* ── 로딩 ── */
      if (phase === 'loading') return (
        <div className="w-full h-full flex flex-col items-center justify-center gap-5" style={{ background: '#FFFBEB' }}>
          <div className="w-20 h-20 border-8 border-amber-100 border-t-amber-500 rounded-full animate-spin" />
          <p className="txt-2xl font-black text-amber-700 shine">🔑 보물상자 여는 중...</p>
        </div>
      );

      /* ════════════════════════════════
         1. 시작 화면
      ════════════════════════════════ */
      if (phase === 'start') return (
        <div className="w-full h-full flex flex-col items-center justify-center p-5 relative overflow-hidden"
          style={{ background: 'linear-gradient(145deg,#fffbeb,#fef9c3)' }}>
          <span className="absolute top-4 left-5 opacity-10 float txt-hero">🎁</span>
          <span className="absolute bottom-8 right-5 opacity-10 float txt-hero" style={{ animationDelay: '.9s' }}>💎</span>
          <span className="absolute top-4 right-5 opacity-10 float txt-hero" style={{ animationDelay: '1.5s' }}>🌟</span>
          <span className="absolute bottom-8 left-5 opacity-10 float txt-hero" style={{ animationDelay: '.4s' }}>✨</span>

          <div className="float mb-3"><TreasureBox isOpen={false} size={140} /></div>

          <h1 className="txt-hero font-black text-amber-900 mb-1 text-center">나만의 보물상자 🎁</h1>
          <p className="txt-xl font-bold text-amber-700 mb-4 text-center word-keep">
            ✨ 이 보물상자 안에는 소중한 보물이 들어있어요 💎🌟
          </p>

          <div className="card-amber w-full max-w-md p-6 shadow-2xl slide-up">
            <p className="text-center font-black text-amber-700 mb-3 txt-xl">📝 내 이름을 골라요</p>

            <select value={student} onChange={e => setStudent(e.target.value)}
              className="w-full p-4 mb-4 bg-amber-50 border-4 border-amber-100 rounded-2xl txt-2xl font-black text-amber-900 text-center focus:outline-none focus:border-amber-400">
              {students.map(s => <option key={s} value={s}>{s}</option>)}
            </select>

            {!micReady ? (
              <button onClick={requestMic}
                className="btn w-full py-4 mb-4 bg-amber-50 text-amber-700 border-4 border-amber-200 rounded-2xl font-black txt-xl pulse-amber">
                🎙️ 마이크 먼저 준비하기
              </button>
            ) : (
              <p className="text-center text-emerald-600 font-black txt-xl mb-4">✅ 마이크 준비 완료!</p>
            )}
            <p className="txt-sm text-center text-slate-500 mb-2">💡 마이크가 안 돼도 키보드로 진행할 수 있어요!</p>

            <button onClick={() => setPhase('intro')}
              className="btn w-full py-5 bg-amber-500 text-white rounded-2xl font-black txt-3xl shadow-xl hover:bg-amber-600">
              시작하기 ▶
            </button>
          </div>

          <button onClick={toggleSound}
            className={`btn mt-4 px-6 py-3 rounded-2xl border-2 shadow-sm txt-xl font-black ${soundOn ? 'bg-amber-100 text-amber-600 border-amber-300' : 'bg-white text-slate-300 border-slate-100'}`}>
            {soundOn ? '🔊 소리 켜짐' : '🔇 소리 꺼짐'}
          </button>
          <p className="txt-sm text-slate-500 mt-1">{soundOn ? '읽어주기 + 효과음 ON' : '글자 못 읽어도 켜면 도움돼요'}</p>
        </div>
      );

      /* ════════════════════════════════
         2. 인트로
      ════════════════════════════════ */
      if (phase === 'intro') return (
        <div className="w-full h-full flex flex-col" style={{ background: '#fffbeb' }}>
          <Header label="🎒 오늘의 활동 안내" soundOn={soundOn} toggleSound={toggleSound} onHome={handleReset} />
          <div className="flex-1 flex flex-col items-center justify-center px-4 py-2 text-center min-h-0 overflow-hidden">
            <h2 className="txt-3xl font-black text-slate-800 mb-4 leading-tight word-keep shrink-0">
              나만의 <span className="text-amber-600">보물상자</span>를<br />어떻게 채울까요? 🎁
            </h2>

            <div className="flex flex-col gap-3 w-full max-w-lg mb-4 min-h-0 flex-1 justify-center">
              <div className="slide-up bg-white p-4 rounded-3xl border-[5px] border-amber-200 shadow-xl flex items-center gap-4 shrink-0">
                <span className="emoji-md">🗺️</span>
                <p className="txt-xl font-black text-amber-900 text-left word-keep leading-tight">
                  총 <strong className="text-rose-500 txt-2xl">3단계</strong>의 미션이 있어요!
                </p>
              </div>
              <div className="slide-up bg-amber-100 p-4 rounded-3xl border-[5px] border-amber-300 shadow-xl flex items-center gap-4 shrink-0" style={{ animationDelay: '0.2s' }}>
                <span className="emoji-md">🎯</span>
                <p className="txt-xl font-black text-amber-900 text-left word-keep leading-tight">
                  좋아하는 것을<br /><strong className="text-rose-600 txt-2xl">모두 골라봐요!</strong>
                </p>
              </div>
              <div className="slide-up bg-rose-50 p-4 rounded-3xl border-[5px] border-rose-200 shadow-xl flex items-center gap-4 shrink-0" style={{ animationDelay: '0.4s' }}>
                <span className="emoji-md">🪞</span>
                <p className="txt-xl font-black text-rose-900 text-left word-keep leading-tight">
                  가장 중요한 보물은 <strong className="text-rose-600 txt-2xl">바로 '나'</strong>예요!
                </p>
              </div>
            </div>

            <button onClick={() => setPhase('concept')}
              className="btn w-full max-w-sm py-4 bg-amber-500 text-white rounded-[2rem] font-black txt-2xl shadow-xl hover:bg-amber-600 shrink-0">
              보물상자 열러 가기 ➡️
            </button>
          </div>
        </div>
      );

      /* ════════════════════════════════
         3. 보물상자 체험
      ════════════════════════════════ */
      if (phase === 'concept') return (
        <div className="w-full h-full flex flex-col" style={{ background: '#fef9c3' }}>
          <Header label="🔑 보물상자 체험" soundOn={soundOn} toggleSound={toggleSound} onHome={handleReset} />
          <div className="flex-1 flex flex-col items-center justify-center px-5 py-4 text-center min-h-0 overflow-hidden">
            <h2 className="txt-3xl font-black text-amber-900 mb-2 word-keep">
              상자를 클릭해서<br />무엇인지 확인해보세요! 👆
            </h2>
            <p className="txt-xl font-bold text-amber-700 mb-3">🎁 어떤 보물이 들어있을까요?</p>

            <div className="relative flex items-center justify-center" style={{ minHeight: '220px' }}>
              {isBoxOpen && (
                <div className="pop-in absolute bg-white rounded-3xl border-8 border-amber-400 px-6 py-4 shadow-2xl z-20 w-72 text-center"
                  style={{ bottom: 'calc(100% + 12px)', left: '50%', transform: 'translateX(-50%)' }}>
                  <p className="emoji-md mb-1">🪞</p>
                  <p className="txt-xl font-black text-amber-800 leading-snug word-keep">
                    세상에서 가장 귀한<br />보물은 바로 <span className="text-amber-600 txt-2xl">'나'</span>야!
                  </p>
                  <p className="txt-lg font-bold text-amber-500 mt-1">💎✨🌟💛🎁</p>
                </div>
              )}
              <div className="cursor-pointer" onClick={() => { setIsBoxOpen(true); playChime(soundOn); if (soundOn) speak('세상에서 가장 귀한 보물은 바로 나야!', soundOn); }}>
                <TreasureBox isOpen={isBoxOpen} size={200} />
              </div>
            </div>

            {!isBoxOpen && <p className="txt-xl font-black text-amber-600 shine mt-3">👆 상자를 눌러보세요!</p>}
            {isBoxOpen && (
              <button onClick={() => { setIsBoxOpen(false); setPhase('stepPopup'); }}
                className="btn pop-in mt-4 w-full max-w-sm py-5 bg-amber-600 text-white rounded-2xl font-black txt-3xl shadow-xl hover:bg-amber-700">
                내 보물 찾으러 가기! ➡️
              </button>
            )}
          </div>
        </div>
      );

      /* ════════════════════════════════
         4. 단계 팝업
      ════════════════════════════════ */
      if (phase === 'stepPopup') {
        const colors = [
          { bg: '#FEF9C3', badgeBg: '#D97706', badgeText: 'white', headText: '#78350F', border: '#FCD34D', emoji: '💛' },
          { bg: '#D1FAE5', badgeBg: '#059669', badgeText: 'white', headText: '#064E3B', border: '#6EE7B7', emoji: '💪' },
          { bg: '#EDE9FE', badgeBg: '#7C3AED', badgeText: 'white', headText: '#3B0764', border: '#C4B5FD', emoji: '🌟' },
        ];
        const c = colors[stepIdx] || colors[0];
        return (
          <div className="w-full h-full flex flex-col items-center justify-center px-4 py-4 text-center cursor-pointer"
            style={{ background: c.bg }} onClick={() => setPhase('activity')}>
            <div className="pop-in font-black px-6 py-2 rounded-full txt-xl mb-3 shadow-lg" style={{ background: c.badgeBg, color: c.badgeText }}>
              {c.emoji} {stepIdx + 1}단계 / {steps.length}단계
            </div>
            <div className="bg-white/95 rounded-3xl px-6 py-4 max-w-lg w-full shadow-2xl pop-in border-4"
              style={{ animationDelay: '.08s', borderColor: c.border }}>
              <p className="txt-base font-black text-slate-500 mb-1">🎯 지금 할 활동</p>
              <h1 className="txt-3xl font-black mb-2 leading-tight word-keep" style={{ color: c.headText }}>
                {currentStep?.title}
              </h1>
              <div className="bg-white rounded-3xl px-5 py-4 txt-xl font-black text-slate-700 mb-4 word-keep shadow-sm border-[4px]" style={{ borderColor: c.border }}>
                <p className="txt-xl text-rose-500 mb-2 font-black border-b-2 pb-2">💡 "{currentStep?.desc}"</p>
                🎯 나를 가장 잘 아는 것이 중요해요!<br />
                <span className="text-rose-500 txt-2xl">나의 보물을 <u className="underline-offset-4">모두</u> 골라봐요!</span>
              </div>
              <p className="txt-xl font-black text-amber-600 animate-bounce mt-2">👆 화면을 눌러서 시작해요!</p>
            </div>
          </div>
        );
      }

      /* ════════════════════════════════
         5. 메인 활동 (보물 선택)
      ════════════════════════════════ */
      if (phase === 'activity') {
        const stepColors = [
          { headerBg: '#FEF9C3', badgeBg: '#D97706', selBg: '#F59E0B', border: '#FCD34D' },
          { headerBg: '#D1FAE5', badgeBg: '#059669', selBg: '#10B981', border: '#6EE7B7' },
          { headerBg: '#EDE9FE', badgeBg: '#7C3AED', selBg: '#8B5CF6', border: '#C4B5FD' },
        ];
        const sc = stepColors[stepIdx] || stepColors[0];
        const allOptions = currentStep?.options || [];

        return (
          <div className="w-full h-full flex flex-col" style={{ background: '#FAFAF9' }}>
            <div className="flex items-center justify-between px-3 py-2 shrink-0 border-b-4" style={{ background: sc.headerBg, borderColor: sc.border }}>
              <button onClick={handleReset} className="btn w-10 h-10 bg-white rounded-xl border-2 border-slate-200 flex items-center justify-center text-slate-400 shadow-sm">
                <HomeIcon />
              </button>
              <div className="flex flex-col items-center gap-0.5">
                <span className="font-black txt-lg" style={{ color: sc.badgeBg }}>
                  {stepIdx + 1}단계: {currentStep?.title}
                </span>
                <span className="font-black txt-base text-white px-3 py-0.5 rounded-full" style={{ background: sc.badgeBg }}>
                  💎 {picks.length}개 골랐어요
                </span>
              </div>
              <button onClick={toggleSound} className={`btn w-10 h-10 rounded-xl border-2 txt-base px-2 ${soundOn ? 'border-amber-300' : 'border-slate-200'}`}
                style={{ background: soundOn ? sc.headerBg : '#fff' }}>
                {soundOn ? '🔊' : '🔇'}
              </button>
            </div>
            <div className="flex items-center justify-center px-3 py-2 shrink-0 border-b-2" style={{ background: sc.headerBg, borderColor: sc.border }}>
              <span className="txt-xl font-black text-center word-keep text-amber-900 border-2 border-white/50 bg-white/40 px-4 py-1 rounded-full shadow-sm">
                🎯 {currentStep?.title}: <strong className="text-rose-600">모두 마음껏 골라봐요!</strong>
              </span>
            </div>

            <div className="flex-1 grid grid-cols-4 grid-rows-2 gap-3 p-3 content-center min-h-0">
              {allOptions.map((opt, idx) => {
                const selected = !!picks.find(p => p.text === opt.text);
                return (
                  <button key={idx} onClick={e => handleSelect(opt, e)}
                    className={`btn flex flex-col items-center justify-center w-full h-full p-2 rounded-3xl border-[5px] shadow-lg transition-all ${selected ? 'scale-105 text-white border-white shadow-2xl' : 'bg-white border-amber-200 hover:border-amber-400 hover:shadow-xl'}`}
                    style={selected ? { background: sc.selBg } : {}}>
                    <span className="emoji-md mb-1">{opt.icon}</span>
                    <span className={`txt-lg font-black word-keep leading-tight ${selected ? 'text-white' : 'text-slate-700'}`}>{opt.text}</span>
                    {selected && <span className="txt-sm font-black text-white mt-1">✓</span>}
                  </button>
                );
              })}
            </div>

            <div className="px-3 shrink-0 flex gap-2 w-full max-w-lg mx-auto mb-1">
              <input type="text" placeholder="내가 원하는 보물을 직접 써봐요! ✍️"
                value={customInput} onChange={e => setCustomInput(e.target.value)}
                className="flex-1 px-4 py-2 rounded-2xl border-4 shadow-inner txt-base font-bold"
                style={{ borderColor: sc.border }}
                onKeyDown={e => {
                  if (e.key === 'Enter' && customInput.trim()) {
                    handleSelect({ text: customInput.trim(), icon: '✍️', feedback: '오, 직접 적었구나! 멋져!' }, e);
                    setCustomInput('');
                  }
                }} />
              <button onClick={e => {
                if (customInput.trim()) {
                  handleSelect({ text: customInput.trim(), icon: '✍️', feedback: '오, 직접 적었구나! 멋진 생각이야!' }, e);
                  setCustomInput('');
                }
              }} className="btn text-white font-black px-5 rounded-2xl txt-base shadow-md hover:scale-105" style={{ background: sc.badgeBg }}>
                추가!
              </button>
            </div>

            <div className="flex items-center gap-2 px-3 py-2 shrink-0 border-t-4 overflow-hidden" style={{ background: sc.headerBg, borderColor: sc.border }}>
              <span className="txt-sm font-black shrink-0" style={{ color: sc.badgeBg }}>내 보물:</span>
              <div className="flex gap-2 flex-1 overflow-x-auto whitespace-nowrap items-center min-w-0" style={{ scrollbarWidth: 'none' }}>
                {picks.length === 0 && <span className="txt-sm font-bold text-slate-400">자유롭게 골라봐요! 누르면 취소돼요.</span>}
                {picks.map((p, i) => (
                  <span key={i} className="txt-base font-black bg-white px-3 py-1 rounded-full border-2 shadow-sm shrink-0" style={{ borderColor: sc.border }}>
                    {p.icon} {p.text}
                  </span>
                ))}
              </div>
              <button onClick={handleDoneSelecting}
                className="btn shrink-0 py-2 px-6 txt-xl font-black text-white rounded-3xl shadow-xl hover:scale-105 shine"
                style={{ background: picks.length > 0 ? '#10B981' : '#9CA3AF' }}>
                ✅ 다 골랐어요!
              </button>
            </div>

            {flyItem && (
              <div className="fixed pointer-events-none z-50 emoji-md"
                style={{ left: flyItem.x, top: flyItem.y, animation: 'fly-up 0.9s ease forwards' }}>
                {flyItem.icon}
              </div>
            )}
            {showDone && (
              <div className="fixed inset-0 flex items-center justify-center z-40 pointer-events-none">
                <div className="pop-in bg-amber-500 text-white px-8 py-6 rounded-3xl shadow-2xl txt-3xl font-black text-center leading-tight">
                  🎉 다 골랐어요!<br />
                  <span className="txt-xl mt-2 block opacity-90">
                    {stepIdx >= steps.length - 1 ? '이제 발표 준비를 해봐요! 🎤' : '다음 보물을 찾으러 가봐요...'}
                  </span>
                </div>
              </div>
            )}
          </div>
        );
      }

      /* ════════════════════════════════
         6. 발표 준비 체크리스트 (NEW)
      ════════════════════════════════ */
      if (phase === 'prepare') {
        const allChecked = prepCheck.posture && prepCheck.voice;
        return (
          <div className="w-full h-full flex flex-col" style={{ background: 'linear-gradient(145deg,#fef9c3,#fde68a)' }}>
            <Header label="🎤 발표 준비!" soundOn={soundOn} toggleSound={toggleSound} onHome={handleReset} />
            <div className="flex-1 flex flex-col items-center justify-center px-5 py-4 min-h-0 overflow-hidden">
              <h2 className="txt-3xl font-black text-amber-900 mb-3 text-center word-keep">
                ✨ 발표 전에 준비할까요?
              </h2>
              <p className="txt-lg font-bold text-amber-700 mb-5 text-center">눌러서 체크해봐요!</p>

              <div className="flex flex-col gap-4 w-full max-w-md mb-5">
                <button onClick={() => setPrepCheck(p => ({ ...p, posture: !p.posture }))}
                  className={`btn p-5 rounded-3xl border-[5px] shadow-xl flex items-center gap-4 transition-all ${prepCheck.posture ? 'bg-emerald-100 border-emerald-400 scale-105' : 'bg-white border-amber-200'}`}>
                  <span className="emoji-lg">{prepCheck.posture ? '✅' : '🧍'}</span>
                  <div className="flex-1 text-left">
                    <p className="txt-2xl font-black text-slate-800 word-keep">바른 자세를 했나요?</p>
                    <p className="txt-base font-bold text-slate-500">허리를 펴고, 손은 가지런히!</p>
                  </div>
                </button>

                <button onClick={() => setPrepCheck(p => ({ ...p, voice: !p.voice }))}
                  className={`btn p-5 rounded-3xl border-[5px] shadow-xl flex items-center gap-4 transition-all ${prepCheck.voice ? 'bg-emerald-100 border-emerald-400 scale-105' : 'bg-white border-amber-200'}`}>
                  <span className="emoji-lg">{prepCheck.voice ? '✅' : '🗣️'}</span>
                  <div className="flex-1 text-left">
                    <p className="txt-2xl font-black text-slate-800 word-keep">큰 소리로 또박또박 할 수 있나요?</p>
                    <p className="txt-base font-bold text-slate-500">친구들이 잘 들을 수 있게!</p>
                  </div>
                </button>
              </div>

              <button onClick={() => { playCorrect(soundOn); setPhase('recording'); }}
                disabled={!allChecked}
                className="btn w-full max-w-md py-5 text-white rounded-3xl font-black txt-2xl shadow-xl"
                style={{ background: allChecked ? '#F59E0B' : '#9CA3AF' }}>
                {allChecked ? '준비 완료! 발표하러 가요 ➡️' : '👆 위 두 가지를 모두 체크해주세요'}
              </button>
            </div>
          </div>
        );
      }

      /* ════════════════════════════════
         7. 발표 녹음 (개선)
      ════════════════════════════════ */
      if (phase === 'recording') {
        return (
          <div className="w-full h-full flex flex-col" style={{ background: 'linear-gradient(145deg,#fffbeb,#fef9c3)' }}>
            <Header label="🎤 발표하기" soundOn={soundOn} toggleSound={toggleSound} onHome={handleReset} />
            <div className="flex-1 flex flex-col px-3 py-2 gap-2 overflow-hidden min-h-0">

              {/* 발표 원고 — 카드 3장 */}
              <div className="card-amber px-3 py-2 shrink-0">
                <div className="flex items-center justify-between mb-1">
                  <p className="txt-base font-black text-amber-700">📄 발표 원고 (이렇게 읽어봐요)</p>
                  <button onClick={readSpeechWithHighlight}
                    className="btn bg-amber-500 text-white px-3 py-1 rounded-xl font-black txt-sm shadow">
                    🔊 도움받기
                  </button>
                </div>
                <div className="flex flex-col gap-1.5">
                  {speechCards.map((card, idx) => {
                    let charPos = 0;
                    for (let i = 0; i < idx; i++) charPos += speechCards[i].text.length + 1;
                    return (
                      <div key={idx} className="rounded-2xl px-3 py-2 border-4 shadow-sm"
                        style={{ background: '#fff', borderColor: card.color }}>
                        <span className="txt-xl font-black text-slate-800 leading-tight word-keep">
                          {Array.from(card.text).map((ch, ci) => {
                            const globalIdx = charPos + ci;
                            const active = helpHighlight >= 0 && Math.abs(helpHighlight - globalIdx) <= 2;
                            return <span key={ci} className={active ? 'char-active' : ''}>{ch}</span>;
                          })}
                        </span>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* 도움받기 예시 */}
              {showHelpExamples && (
                <div className="card-amber px-3 py-2 shrink-0 max-h-48 overflow-auto">
                  <div className="flex items-center justify-between mb-1">
                    <p className="txt-base font-black text-amber-700">💡 발표 예시 문장 (눌러서 들어요)</p>
                    <button onClick={() => setShowHelpExamples(false)} className="btn text-slate-500 txt-base font-black">✕</button>
                  </div>
                  <div className="flex flex-col gap-1">
                    {helpExamples.map((ex, i) => (
                      <button key={i} onClick={() => readExample(ex)}
                        className="btn text-left p-2 bg-amber-50 hover:bg-amber-100 rounded-xl border-2 border-amber-200 txt-base font-bold text-slate-700">
                        🔊 {ex}
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* 도움받기 + 완성 문장 듣기 버튼 + 안내 */}
              <div className="flex gap-2 shrink-0">
                <button onClick={() => setShowHelpExamples(s => !s)}
                  className="btn flex-1 py-2 bg-sky-100 text-sky-800 border-4 border-sky-300 rounded-2xl font-black txt-base shadow">
                  💡 예시 문장 더 보기 {helpCount > 0 && <span className="text-xs">(도움 {helpCount}회)</span>}
                </button>
                <button onClick={() => { setHelpCount(c => c + 1); if (soundOn) speak(speechFullText, true, { rate: 0.9 }); else alert('🔊 소리를 켜면 들을 수 있어요!'); }}
                  className="btn flex-1 py-2 bg-violet-100 text-violet-800 border-4 border-violet-300 rounded-2xl font-black txt-base shadow">
                  🔊 완성 문장 듣기
                </button>
              </div>

              {/* 실시간 STT */}
              {recStep === 'rec' && (
                <div className="card-amber px-3 py-2 shrink-0 bg-rose-50 border-rose-300">
                  <p className="txt-sm font-black text-rose-600 mb-1">📝 내가 말하는 중... (실시간)</p>
                  <p className="txt-lg font-bold text-slate-700 min-h-[2rem] word-keep">{liveTranscript || '(말해보세요!)'}</p>
                </div>
              )}

              {/* 녹음 컨트롤 */}
              <div className="card-amber px-3 py-2 shrink-0">
                {!keyboardMode && recStep === 'idle' && (
                  <>
                    <p className="txt-sm font-bold text-amber-700 mb-1 text-center">👇 녹음 버튼을 누르면 발표를 시작할 수 있어요!</p>
                    <button onClick={startRec}
                      className="btn pulse-amber w-full py-3 bg-rose-500 text-white rounded-2xl font-black txt-2xl shadow-xl">
                      🔴 녹음 시작!
                    </button>
                    <div className="flex gap-2 mt-2">
                      <button onClick={() => setKeyboardMode(true)}
                        className="btn flex-1 py-2 bg-slate-100 text-slate-700 rounded-2xl font-black txt-base border-2 border-slate-300">
                        ⌨️ 키보드로 입력하기
                      </button>
                      <button onClick={() => setPhase('selfEval')}
                        className="btn flex-1 py-2 bg-slate-100 text-slate-500 rounded-2xl font-bold txt-base border-2 border-slate-300">
                        ⏭️ 건너뛰기
                      </button>
                    </div>
                  </>
                )}
                {recStep === 'rec' && (
                  <div className="flex flex-col gap-2">
                    <p className="txt-xl font-black text-rose-500 animate-pulse text-center">🔴 녹음 중... 발표해보세요!</p>
                    <button onClick={stopRec}
                      className="btn w-full py-3 bg-slate-800 text-white rounded-2xl font-black txt-2xl shadow-xl">
                      ⏹ 다 말했어요!
                    </button>
                  </div>
                )}
                {recStep === 'done' && (
                  <div className="flex flex-col gap-2">
                    <p className="txt-base font-black text-emerald-600 text-center">✅ 녹음 완료! 내 목소리를 들어봐요 👂</p>
                    {audioUrl && <audio ref={audioPlayerRef} controls src={audioUrl} className="w-full rounded-xl" style={{ height: '40px' }} />}
                    {finalTranscript && (
                      <div className="bg-emerald-50 border-2 border-emerald-200 rounded-xl px-3 py-2">
                        <p className="txt-sm font-black text-emerald-700">📝 내가 말한 내용:</p>
                        <p className="txt-base font-bold text-slate-700 word-keep">{finalTranscript}</p>
                      </div>
                    )}
                    <div className="flex gap-2">
                      <button onClick={reRecord}
                        className="btn flex-1 py-2 bg-slate-100 text-slate-600 rounded-2xl font-bold txt-base">
                        🔄 다시 녹음
                      </button>
                      <button onClick={() => { playCorrect(soundOn); setPhase('selfEval'); }}
                        className="btn flex-[2] py-2 bg-emerald-500 text-white rounded-2xl font-black txt-lg shadow-xl">
                        다음 ➡️ 별점 매기기
                      </button>
                    </div>
                  </div>
                )}

                {keyboardMode && (
                  <div className="flex flex-col gap-2">
                    <p className="txt-base font-black text-amber-700">⌨️ 발표 내용을 직접 적어볼까요?</p>
                    <textarea value={keyboardText} onChange={e => setKeyboardText(e.target.value)}
                      placeholder="여기에 발표 내용을 적어보세요..."
                      className="w-full p-3 rounded-2xl border-4 border-amber-200 txt-base font-bold min-h-[80px] focus:outline-none focus:border-amber-400" />
                    <div className="flex gap-2">
                      <button onClick={() => setKeyboardMode(false)} className="btn flex-1 py-2 bg-slate-100 text-slate-600 rounded-2xl font-bold txt-base">
                        🎤 녹음으로 돌아가기
                      </button>
                      <button onClick={() => { playCorrect(soundOn); setPhase('selfEval'); }}
                        className="btn flex-[2] py-2 bg-emerald-500 text-white rounded-2xl font-black txt-lg shadow-xl">
                        다음 ➡️
                      </button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      }

      /* ════════════════════════════════
         8. 자기평가 (별점 + 칭찬 스티커)
      ════════════════════════════════ */
      if (phase === 'selfEval') {
        const stickerTypes = [
          { kind: 'star', icon: '⭐', label: '잘했어요!' },
          { kind: 'heart', icon: '💖', label: '최고예요!' },
          { kind: 'flower', icon: '🌸', label: '예뻐요!' },
          { kind: 'trophy', icon: '🏆', label: '대단해요!' },
        ];
        return (
          <div className="w-full h-full flex flex-col" style={{ background: 'linear-gradient(145deg,#fef9c3,#fde68a)' }}>
            <Header label="⭐ 내 발표 돌아보기" soundOn={soundOn} toggleSound={toggleSound} onHome={handleReset} />
            <div className="flex-1 flex flex-col items-center px-4 py-3 gap-3 overflow-auto min-h-0">

              <h2 className="txt-2xl font-black text-amber-900 text-center word-keep shrink-0">
                🎧 내 녹음을 들어보고 스스로 평가해봐요!
              </h2>

              {/* 녹음 다시 듣기 또는 키보드로 적은 내용 보기 */}
              {audioUrl && (
                <div className="card-amber w-full max-w-md p-3 shrink-0">
                  <p className="txt-base font-black text-amber-700 mb-1 text-center">👂 내 발표 다시 듣기</p>
                  <audio controls src={audioUrl} className="w-full rounded-xl" style={{ height: '40px' }} />
                  {finalTranscript && (
                    <p className="txt-sm font-bold text-slate-600 bg-amber-50 rounded-xl p-2 mt-2 word-keep">📝 {finalTranscript}</p>
                  )}
                </div>
              )}
              {!audioUrl && keyboardText && (
                <div className="card-amber w-full max-w-md p-3 shrink-0">
                  <p className="txt-base font-black text-amber-700 mb-1 text-center">⌨️ 내가 적은 발표 내용</p>
                  <p className="txt-base font-bold text-slate-700 bg-amber-50 rounded-xl p-2 word-keep">{keyboardText}</p>
                </div>
              )}

              {/* 별점 */}
              <div className="card-amber w-full max-w-md p-4 shrink-0">
                <StarRating value={selfStars} onChange={setSelfStars} label="내 발표는 어땠나요?" />
              </div>

              {/* 칭찬 스티커 */}
              <div className="card-amber w-full max-w-md p-3 shrink-0">
                <p className="txt-base font-black text-amber-700 mb-2 text-center">🎁 스스로에게 칭찬 스티커를 줘보세요!</p>
                <div className="grid grid-cols-4 gap-2">
                  {stickerTypes.map(s => (
                    <button key={s.kind} onClick={() => addSticker(s.kind)}
                      className="btn p-2 bg-amber-50 hover:bg-amber-100 rounded-2xl border-2 border-amber-200 flex flex-col items-center">
                      <span className="emoji-md">{s.icon}</span>
                      <span className="txt-sm font-black text-amber-800">{s.label}</span>
                    </button>
                  ))}
                </div>
                {stickers.length > 0 && (
                  <p className="txt-base font-black text-emerald-600 text-center mt-2">
                    🎉 칭찬 {stickers.length}개! 정말 멋져요!
                  </p>
                )}
              </div>

              {/* 다음 버튼: 별점에 따라 안내 다름 */}
              {selfStars > 0 && (
                <div className="card-amber w-full max-w-md p-3 shrink-0">
                  {selfStars <= 3 ? (
                    <div className="flex flex-col gap-2">
                      <p className="txt-base font-black text-rose-600 text-center word-keep">
                        💪 다시 한번 도전해볼까요?<br/>
                        <span className="txt-sm font-bold text-slate-500">잘 안 됐어도 다시 해보면 더 멋질 거예요!</span>
                      </p>
                      <button onClick={() => {
                          setReRecordCount(c => c + 1);
                          setSelfStars(0);
                          setRecStep('idle'); setAudioUrl(null); setAudioB64(null);
                          setLiveTranscript(''); setFinalTranscript('');
                          setPhase('recording');
                        }}
                        className="btn w-full py-3 bg-rose-500 text-white rounded-2xl font-black txt-xl shadow-xl">
                        🔄 다시 녹음하러 가기
                      </button>
                      <button onClick={() => setPhase('reflect')}
                        className="btn w-full py-2 bg-slate-100 text-slate-600 rounded-2xl font-bold txt-base">
                        그래도 다음으로 가기 ➡️
                      </button>
                    </div>
                  ) : (
                    <div className="flex flex-col gap-2">
                      <p className="txt-base font-black text-emerald-600 text-center">잘했어요! 다음으로 가볼까요?</p>
                      <div className="flex gap-2">
                        <button onClick={() => {
                            setReRecordCount(c => c + 1);
                            setSelfStars(0);
                            setRecStep('idle'); setAudioUrl(null); setAudioB64(null);
                            setLiveTranscript(''); setFinalTranscript('');
                            setPhase('recording');
                          }}
                          className="btn flex-1 py-2 bg-slate-100 text-slate-700 rounded-2xl font-bold txt-base border-2 border-slate-300">
                          🔄 한번 더 해볼래요
                        </button>
                        <button onClick={() => { playCorrect(soundOn); setPhase('reflect'); }}
                          className="btn flex-[2] py-3 bg-emerald-500 text-white rounded-2xl font-black txt-xl shadow-xl">
                          다음 ➡️
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        );
      }

      /* ════════════════════════════════
         9. 성찰 (배움 정리)
      ════════════════════════════════ */
      if (phase === 'reflect') {
        const reflectOptions = [
          { key: '나의 보물을 찾았어요', icon: '💎' },
          { key: '친구와 다른 점을 알았어요', icon: '🤝' },
          { key: '발표를 용기 있게 했어요', icon: '🎤' },
          { key: '꿈을 생각해봤어요', icon: '🌈' },
        ];
        return (
          <div className="w-full h-full flex flex-col" style={{ background: 'linear-gradient(145deg,#ecfdf5,#d1fae5)' }}>
            <Header label="🌱 오늘의 배움 정리" soundOn={soundOn} toggleSound={toggleSound} onHome={handleReset} />
            <div className="flex-1 flex flex-col items-center px-4 py-3 gap-3 overflow-auto min-h-0">

              <h2 className="txt-2xl font-black text-emerald-800 text-center word-keep shrink-0">
                🌱 오늘 무엇을 배웠나요?
              </h2>

              <div className="card-amber w-full max-w-lg p-3 shrink-0">
                <p className="txt-base font-black text-emerald-700 mb-2 text-center">💚 가장 좋았던 것을 골라봐요</p>
                <div className="grid grid-cols-2 gap-2">
                  {reflectOptions.map(o => (
                    <button key={o.key} onClick={() => setReflectChoice(o.key)}
                      className={`btn p-3 rounded-2xl border-[4px] shadow-sm flex flex-col items-center transition-all ${reflectChoice === o.key ? 'bg-emerald-500 text-white border-emerald-700 scale-105' : 'bg-white border-emerald-200 text-slate-700'}`}>
                      <span className="emoji-md">{o.icon}</span>
                      <span className="txt-base font-black word-keep text-center">{o.key}</span>
                    </button>
                  ))}
                </div>
              </div>

              <div className="card-amber w-full max-w-lg p-3 shrink-0">
                <StarRating value={reflectStars} onChange={setReflectStars} label="🌟 오늘 활동에 대한 나의 다짐 별점은?" />
                <p className="txt-sm text-slate-500 text-center mt-2 word-keep">"앞으로 더 노력해볼래요!" — 마음을 별로 표현해봐요</p>
              </div>

              {/* 별 3개 이하 → 다시 활동 옵션 */}
              {reflectStars > 0 && reflectStars <= 3 && (
                <div className="bg-amber-100 border-4 border-amber-300 rounded-2xl p-3 shrink-0 w-full max-w-lg">
                  <p className="txt-base font-black text-amber-800 text-center mb-2 word-keep">
                    💪 더 멋지게 해보고 싶나요? 한번 더 도전해봐요!
                  </p>
                  <button onClick={handleReset}
                    className="btn w-full py-2 bg-amber-500 text-white rounded-2xl font-black txt-base shadow-xl">
                    🔄 처음부터 다시 해볼래요
                  </button>
                </div>
              )}

              {(reflectStars > 0 && reflectChoice) && (
                <button onClick={() => { playCorrect(soundOn); setPhase('report'); }}
                  className="btn w-full max-w-lg py-4 bg-emerald-500 text-white rounded-3xl font-black txt-2xl shadow-xl shrink-0">
                  🏆 수료증 받기!
                </button>
              )}
              {!(reflectStars > 0 && reflectChoice) && (
                <p className="txt-sm font-bold text-slate-500 text-center shrink-0">
                  👆 가장 좋았던 것을 고르고, 다짐 별점도 매겨주세요
                </p>
              )}
            </div>
          </div>
        );
      }

      /* ════════════════════════════════
         10. 수료증 (섹션별 디자인 강화)
      ════════════════════════════════ */
      if (phase === 'report') {
        const CategoryCard = ({ emoji, label, items, bg, border, textColor, titleBg }) => (
          <div className="flex-1 rounded-3xl border-4 shadow-lg flex flex-col min-h-0 overflow-hidden" style={{ background: bg, borderColor: border }}>
            <div className="text-center py-2 shrink-0 border-b-4" style={{ background: titleBg, borderColor: border }}>
              <p className="txt-xl font-black" style={{ color: textColor }}>{emoji} {label}</p>
            </div>
            <div className="flex flex-col gap-2 flex-1 justify-center min-h-0 p-3 overflow-auto">
              {items.length === 0 ? (
                <p className="text-center txt-base text-slate-400">없어요</p>
              ) : items.map((item, i) => (
                <div key={i} className="flex items-center gap-2 bg-white/90 rounded-2xl px-3 py-2 shadow-sm shrink-0 border-2" style={{ borderColor: border }}>
                  <span className="emoji-sm">{item.icon}</span>
                  <span className="txt-lg font-black text-slate-800 word-keep">{item.text}</span>
                </div>
              ))}
            </div>
          </div>
        );

        return (
          <div className="w-full h-full flex flex-col relative" style={{ background: 'linear-gradient(145deg,#fffbeb,#fef3c7)' }}>
            {saving && (
              <div className="absolute inset-0 bg-white/80 flex items-center justify-center z-50">
                <div className="w-16 h-16 border-4 border-amber-100 border-t-amber-500 rounded-full animate-spin" />
              </div>
            )}

            <div className="flex items-center justify-between px-5 py-3 shrink-0">
              <h1 className="txt-3xl font-black text-amber-900">🏆 보물상자 완성!</h1>
              <button onClick={toggleSound}
                className={`btn rounded-2xl border-2 shadow-sm txt-xl px-3 py-2 ${soundOn ? 'bg-amber-100 text-amber-600 border-amber-300' : 'bg-white text-slate-300 border-slate-100'}`}>
                {soundOn ? '🔊' : '🔇'}
              </button>
            </div>

            <div className="flex-1 mx-3 mb-2 treasure-border overflow-hidden flex flex-col min-h-0">
              <div className="text-center py-2 shrink-0" style={{ background: 'linear-gradient(90deg,#FCD34D,#F59E0B,#FCD34D)' }}>
                <p className="txt-2xl font-black text-amber-900">✨ 나만의 보물상자 수료증 ✨</p>
                <p className="txt-lg font-black text-amber-800">🎖️ {student} 학생, 정말 멋져요! 🎖️</p>
              </div>

              <div className="flex-1 flex gap-2 p-3 min-h-0">
                <CategoryCard emoji="💛" label="좋아하는 것" items={likeItems} bg="#FFFBEB" border="#FCD34D" titleBg="#FEF3C7" textColor="#92400E" />
                <CategoryCard emoji="💪" label="잘하는 것" items={skillItems} bg="#F0FDF4" border="#86EFAC" titleBg="#DCFCE7" textColor="#065F46" />
                <CategoryCard emoji="🌟" label="되고 싶은 사람" items={dreamItems} bg="#F5F3FF" border="#C4B5FD" titleBg="#EDE9FE" textColor="#4C1D95" />
              </div>

              <div className="text-center py-2 shrink-0 border-t-4 border-amber-300 bg-amber-50">
                <p className="txt-base font-bold text-amber-700">🎁💎🌟✨🎊🎉🎈🏆🌈💛🥰💪🌳🎈🎊✨🌟💎🎁</p>
                <p className="txt-sm font-bold text-amber-600">{new Date().toLocaleDateString('ko-KR')}</p>
              </div>
            </div>

            <div className="flex gap-2 px-3 pb-3 shrink-0">
              <button onClick={downloadCert}
                className="btn flex-1 py-3 bg-amber-600 text-white rounded-2xl font-black txt-xl shadow-xl hover:bg-amber-700">
                🖼️ 수료증 저장
              </button>
              <button onClick={handleReset}
                className="btn flex-1 py-3 bg-slate-700 text-white rounded-2xl font-black txt-xl shadow-xl hover:bg-slate-800">
                🏠 처음으로
              </button>
            </div>
          </div>
        );
      }

      return null;
    };

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>

</html>
