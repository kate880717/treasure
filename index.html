<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>나만의 보물상자 🎁</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      margin: 0;
      padding: 0;
      font-family: 'Jua', 'Malgun Gothic', sans-serif;
      background: #FFFBEB;
      -webkit-user-select: none;
      user-select: none;
    }

    #root {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #app {
      width: 100%;
      height: 100%;
      max-width: 1024px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: linear-gradient(160deg, #fffbeb 0%, #fef9c3 60%, #fef3c7 100%);
      box-shadow: 0 0 60px rgba(0, 0, 0, 0.18);
    }

    @media (min-width: 768px) {
      #app {
        border-radius: 2.5rem;
        height: 100%;
      }
    }

    ::-webkit-scrollbar {
      display: none;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    @keyframes pulse-ring {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(245, 158, 11, .5);
      }

      50% {
        box-shadow: 0 0 0 18px rgba(245, 158, 11, 0);
      }
    }

    @keyframes shine {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .55;
      }
    }

    @keyframes pop-in {
      0% {
        transform: scale(0) rotate(-8deg);
        opacity: 0;
      }

      80% {
        transform: scale(1.07) rotate(2deg);
      }

      100% {
        transform: scale(1) rotate(0);
        opacity: 1;
      }
    }

    @keyframes fly-up {
      from {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }

      to {
        opacity: 0;
        transform: translate(-50%, -220%) scale(0.18);
      }
    }

    @keyframes slide-up {
      from {
        transform: translateY(30px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .float {
      animation: float 3s ease-in-out infinite;
    }

    .pulse-amber {
      animation: pulse-ring 2s ease-in-out infinite;
    }

    .shine {
      animation: shine 1.6s ease-in-out infinite;
    }

    .pop-in {
      animation: pop-in .45s cubic-bezier(.34, 1.56, .64, 1) both;
    }

    .slide-up {
      animation: slide-up .4s ease both;
    }

    .btn {
      transition: transform .12s, box-shadow .12s;
      cursor: pointer;
      user-select: none;
    }

    .btn:active {
      transform: scale(.92);
    }

    /* 저학년 태블릿용 큰 글씨 */
    .txt-sm {
      font-size: clamp(1rem, 2vw, 1.2rem);
    }

    .txt-base {
      font-size: clamp(1.1rem, 2.5vw, 1.4rem);
    }

    .txt-lg {
      font-size: clamp(1.25rem, 3vw, 1.65rem);
    }

    .txt-xl {
      font-size: clamp(1.5rem, 3.5vw, 2rem);
    }

    .txt-2xl {
      font-size: clamp(1.8rem, 4vw, 2.4rem);
    }

    .txt-3xl {
      font-size: clamp(2rem, 4.5vw, 2.8rem);
    }

    .txt-4xl {
      font-size: clamp(2.4rem, 5.5vw, 3.4rem);
    }

    .txt-hero {
      font-size: clamp(2.8rem, 7vw, 4.2rem);
    }

    .emoji-sm {
      font-size: clamp(1.6rem, 3.5vw, 2.2rem);
      line-height: 1;
    }

    .emoji-md {
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1;
    }

    .emoji-lg {
      font-size: clamp(3rem, 7vw, 4.5rem);
      line-height: 1;
    }

    .word-keep {
      word-break: keep-all;
    }

    /* 보물상자 수료증 테두리 */
    .treasure-border {
      border: 5px solid #B45309;
      box-shadow: 0 0 0 3px #FCD34D, 0 0 0 8px #B45309, 0 10px 36px rgba(180, 83, 9, .22);
      border-radius: 1.8rem;
    }

    .card-amber {
      background: #fff;
      border-radius: 1.5rem;
      box-shadow: 0 6px 24px rgba(0, 0, 0, .08);
      border: 3px solid #fde68a;
    }
  </style>

  <script>
    /* ─────────────────────────────────────────────
       GAS 웹앱 URL — GitHub Pages ↔ Google Sheets
       ───────────────────────────────────────────── */
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzMD-TZrAXntTnxuCd1eW0Y57o9y0RXX54j7TjO3Jfn4ORNOE8rBv6zlgBMCDuO1IwwtQ/exec";  // ★ GAS 배포 후 여기에 URL 붙여넣기

    const gasGet = async (action) => {
      try {
        if (!GAS_URL) return null;
        const r = await fetch(`${GAS_URL}?action=${action}`, { redirect: 'follow' });
        return JSON.parse(await r.text());
      } catch (_) { return null; }
    };
    const gasPost = async (payload) => {
      try {
        if (!GAS_URL) return;
        await fetch(GAS_URL, {
          method: 'POST', mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(payload)
        });
      } catch (_) { }
    };

    /* 기본 학생 목록 (GAS 연결 전 폴백) */
    const SAMPLES = ['김민준', '이하은', '박서준', '최지아', '정수아', '한지호'];

    /* 기본 커리큘럼 (GAS 연결 전 폴백) */
    const DEFAULT_STEPS = [
      {
        id: 1, title: '내가 좋아하는 것', desc: '내가 좋아하는 게 뭔지 알아볼까요? 💛', options: [
          { text: '그림 그리기', icon: '🎨', feedback: '그림 그리는 걸 좋아하는구나! 정말 멋져!' },
          { text: '노래 하기', icon: '🎤', feedback: '노래가 마음을 행복하게 해줘!' },
          { text: '친구랑 놀기', icon: '👫', feedback: '친구들과 함께라면 즐거워!' },
          { text: '맛있는 간식', icon: '🍩', feedback: '맛있는 걸 먹으면 기분이 좋아지지!' },
          { text: '블록 놀이', icon: '🧱', feedback: '블록으로 멋진 세상을 만드는구나!' },
          { text: '책 읽기', icon: '📚', feedback: '책 속엔 보물이 정말 많아!' },
          { text: '달리기', icon: '🏃', feedback: '씩씩하게 뛰는 모습이 멋져!' },
          { text: '춤추기', icon: '💃', feedback: '춤을 좋아하는구나! 몸이 리듬을 기억해!' },
        ]
      },
      {
        id: 2, title: '내가 잘하는 것', desc: '이번엔 내가 어떤 걸 잘하는지 찾아볼까요? 💪', options: [
          { text: '인사하기', icon: '🙇', feedback: '밝게 인사하는 모습이 예뻐!' },
          { text: '정리정돈', icon: '🧹', feedback: '스스로 정리하는 습관 훌륭해!' },
          { text: '달리기', icon: '🏃', feedback: '쌩쌩 잘 달리는구나!' },
          { text: '도와주기', icon: '🤝', feedback: '친구를 돕는 따뜻한 마음씨!' },
          { text: '발표하기', icon: '📢', feedback: '용기 있게 잘 말하는구나!' },
          { text: '골고루 먹기', icon: '🥗', feedback: '음식을 골고루 먹어서 튼튼하겠어!' },
          { text: '그림 그리기', icon: '🖼️', feedback: '예쁜 그림 솜씨를 가졌구나!' },
          { text: '줄넘기', icon: '➰', feedback: '줄넘기를 잘 하는구나!' },
        ]
      },
      {
        id: 3, title: '내가 되고 싶은 사람', desc: '앞으로 나는 어떤 사람이 되고 싶니? 🌟', options: [
          { text: '친절한 사람', icon: '🥰', feedback: '세상을 따뜻하게 만들 거야!' },
          { text: '씩씩한 사람', icon: '💪', feedback: '용감하게 이겨내는 멋진 사람!' },
          { text: '재미있는 사람', icon: '😄', feedback: '모두를 즐겁게 해줄 거야!' },
          { text: '똑똑한 사람', icon: '🎓', feedback: '문제를 척척 해결할 거야!' },
          { text: '건강한 사람', icon: '🌳', feedback: '몸도 마음도 튼튼한 사람!' },
          { text: '꿈을 이루는 사람', icon: '🌈', feedback: '멋진 꿈을 꼭 이룰 거야!' },
          { text: '친구가 많은 사람', icon: '👪', feedback: '많은 친구를 사귀는 사람!' },
          { text: '예술가', icon: '🎭', feedback: '세상을 아름답게 만들 거야!' },
        ]
      },
    ];

    /* TTS */
    const speak = (text, on) => {
      if (!on || !window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ko-KR'; u.rate = 0.88; u.pitch = 1.1;
      const setVoice = () => {
        const vs = window.speechSynthesis.getVoices();
        let v = vs.find(v => v.lang === 'ko-KR' && v.name.includes('Google') && v.name.includes('여'));
        if (!v) v = vs.find(v => v.lang === 'ko-KR' && v.name.includes('Google'));
        if (!v) v = vs.find(v => v.lang === 'ko-KR');
        if (v) u.voice = v;
      };
      if (window.speechSynthesis.getVoices().length === 0) {
        window.speechSynthesis.onvoiceschanged = () => { setVoice(); window.speechSynthesis.speak(u); };
      } else { setVoice(); window.speechSynthesis.speak(u); }
    };

    /* 효과음 */
    const playChime = () => {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.12, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.3);
      } catch (_) { }
    };
  </script>
</head>

<body>
  <div id="root">
    <div id="app"></div>
  </div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ── 홈 버튼 아이콘 ── */
    const HomeIcon = () => (
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
        <polyline points="9 22 9 12 15 12 15 22" />
      </svg>
    );

    /* ── 보물상자 SVG ── */
    const TreasureBox = ({ isOpen = false, size = 180 }) => (
      <svg width={size} height={size} viewBox="0 0 100 100" fill="none" className="drop-shadow-2xl">
        {/* 하단 몸체 */}
        <rect x="10" y="45" width="80" height="50" rx="5" fill="#B45309" stroke="#78350F" strokeWidth="2.5" />
        {/* 금색 띠 */}
        <rect x="10" y="55" width="80" height="7" fill="#F59E0B" opacity="0.85" />
        {/* 리벳 장식 */}
        {[18, 35, 52, 69].map(x => <circle key={x} cx={x + 4} cy={72} r="3" fill="#FCD34D" opacity="0.7" />)}
        {/* 자물쇠 */}
        <circle cx="50" cy="45" r="8" fill="#FCD34D" stroke="#B45309" strokeWidth="2" />
        <rect x="46" y="43" width="8" height="5" rx="1" fill="#B45309" />
        {/* 뚜껑 (isOpen이면 열림) */}
        <g style={{ transformOrigin: '10px 45px', transform: isOpen ? 'rotate(-38deg) translateY(-14px)' : 'none', transition: 'all .6s cubic-bezier(.34,1.56,.64,1)' }}>
          <path d="M10 45 L10 30 Q50 5 90 30 L90 45 Z" fill="#D97706" stroke="#78350F" strokeWidth="2.5" />
          {/* 뚜껑 가운데 장식 패드 */}
          <rect x="42" y="37" width="16" height="9" fill="#FCD34D" rx="2" />
        </g>
        {/* 보물 빛나기 (열렸을 때) */}
        {isOpen && <>
          <text x="28" y="43" fontSize="13" textAnchor="middle">✨</text>
          <text x="54" y="39" fontSize="9" textAnchor="middle">💎</text>
          <text x="71" y="44" fontSize="11" textAnchor="middle">🌟</text>
        </>}
      </svg>
    );

    /* ── 공통 헤더 ── */
    const Header = ({ label, soundOn, toggleSound, onHome, badge }) => (
      <div className="flex items-center justify-between px-4 py-3 shrink-0 bg-amber-50/95 backdrop-blur-sm border-b-4 border-amber-100">
        <div className="flex items-center gap-2">
          <button onClick={onHome} className="btn flex items-center justify-center w-12 h-12 bg-white rounded-2xl border-2 border-amber-100 text-amber-600 shadow-sm">
            <HomeIcon />
          </button>
          <span className="txt-lg font-black text-amber-800 bg-white px-4 py-2 rounded-2xl border-2 border-amber-100 shadow-sm">{label}</span>
          {badge && <span className="txt-base font-black text-white px-3 py-1 rounded-full bg-amber-500 shadow-sm">{badge}</span>}
        </div>
        <button onClick={toggleSound}
          className={`btn w-13 h-13 rounded-2xl border-2 shadow-sm txt-xl px-3 py-2 ${soundOn ? 'bg-amber-100 text-amber-600 border-amber-300' : 'bg-white text-slate-300 border-slate-100'}`}>
          {soundOn ? '🔊' : '🔇'}
        </button>
      </div>
    );

    /* ══════════════════════════════════════════════
       메인 앱 컴포넌트
    ══════════════════════════════════════════════ */
    const App = () => {
      const [phase, setPhase] = useState('loading');
      const [students, setStudents] = useState([]);
      const [student, setStudent] = useState('');
      const [soundOn, setSoundOn] = useState(false);
      const [micReady, setMicReady] = useState(false);
      const [steps, setSteps] = useState([]);
      const [stepIdx, setStepIdx] = useState(0);
      const [myTreasures, setMyTreasures] = useState([]); // [{stepTitle,text,icon}]
      const [picks, setPicks] = useState([]);        // 현재 단계 선택 (최대 2)
      const [isBoxOpen, setIsBoxOpen] = useState(false);
      const [flyItem, setFlyItem] = useState(null);
      const [showDone, setShowDone] = useState(false);
      const [customInput, setCustomInput] = useState('');

      // 녹음 관련
      const [recStep, setRecStep] = useState('idle'); // idle | rec | done
      const [audioUrl, setAudioUrl] = useState(null);
      const [audioB64, setAudioB64] = useState(null);
      const [saving, setSaving] = useState(false);
      const [saved, setSaved] = useState(false);

      const mrRef = useRef(null);
      const chunksRef = useRef([]);
      const permStreamRef = useRef(null);

      const currentStep = steps[stepIdx] || null;

      // ── 편의 파생 데이터 (수료증/결과용) ──
      const likeItems = myTreasures.filter(t => t.stepTitle === steps[0]?.title);
      const skillItems = myTreasures.filter(t => t.stepTitle === steps[1]?.title);
      const dreamItems = myTreasures.filter(t => t.stepTitle === steps[2]?.title);

      /* ── TTS 자동 읽기 ── */
      useEffect(() => {
        if (!soundOn) return;
        if (phase === 'intro') speak('나만의 보물상자를 어떻게 채울까요? 총 3단계의 미션이 있어요! 좋아하는 것을 모두 골라볼까요? 가장 중요한 보물은 바로 나예요!', true);
        if (phase === 'concept') speak('상자를 클릭해서 무엇인지 확인해보세요! 가장 귀한 보물은 바로 나야 나!', true);
        if (phase === 'stepPopup' && currentStep) speak(`${currentStep.desc} 나를 가장 잘 아는 것이 중요해요. 나의 보물을 모두 골라봐요!`, true);
        if (phase === 'activity' && currentStep) speak(`${currentStep.title}. 모두 마음껏 골라봐요! 원하는 보물이 없다면 직접 적어보세요!`, true);
        if (phase === 'recording') speak('나만의 보물상자를 발표해볼까요? 발표 원고를 읽고 녹음 시작 버튼을 눌러봐요!', true);
      }, [phase, stepIdx, soundOn]);

      /* ── 수료증 화면 진입 시 confetti + 자동 저장 ── */
      useEffect(() => {
        if (phase !== 'report') return;
        confetti({ particleCount: 220, spread: 90, origin: { y: 0.6 } });
        if (soundOn) speak('와! 보물상자가 가득 찼어요! 수료증을 받아봐요!', true);
        if (!saved && GAS_URL) {
          setSaved(true);
          const lk = likeItems.map(t => `${t.icon}${t.text}`);
          const sk = skillItems.map(t => `${t.icon}${t.text}`);
          const dr = dreamItems.map(t => `${t.icon}${t.text}`);
          gasPost({ action: 'saveResult', data: { name: student, likes: lk, skills: sk, dreams: dr, audioBase64: audioB64 } });
        }
      }, [phase]);

      /* ── 초기 데이터 로드 ── */
      useEffect(() => {
        if (window.speechSynthesis) window.speechSynthesis.getVoices();
        (async () => {
          let names = [...SAMPLES];
          let stepsData = DEFAULT_STEPS;
          if (GAS_URL) {
            const remoteStudents = await gasGet('getStudentList');
            if (Array.isArray(remoteStudents) && remoteStudents.length > 0) names = remoteStudents;
            const remoteQuiz = await gasGet('getQuizData');
            if (Array.isArray(remoteQuiz) && remoteQuiz.length > 0) stepsData = remoteQuiz;
          }
          setStudents(names);
          setStudent(names[0] || '');
          setSteps(stepsData);
          setPhase('start');
        })();
      }, []);

      /* ── 마이크 권한 ── */
      const requestMic = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          permStreamRef.current = stream;
          setMicReady(true);
        } catch (_) { alert('마이크 권한이 없어요. 브라우저 설정에서 허용해주세요.'); }
      };

      /* ── 초기화 ── */
      const handleReset = useCallback(() => {
        setPhase('start');
        setStepIdx(0); setMyTreasures([]); setPicks([]);
        setIsBoxOpen(false); setFlyItem(null); setShowDone(false);
        setRecStep('idle'); setAudioUrl(null); setAudioB64(null);
        setSaving(false); setSaved(false);
      }, []);

      /* ── 보물 선택 (토글 및 모두 고르기 가능) ── */
      const handleSelect = useCallback((opt, e) => {
        const isAlreadyPicked = !!picks.find(p => p.text === opt.text);
        if (isAlreadyPicked) {
          setPicks(prev => prev.filter(p => p.text !== opt.text)); // 클릭 시 선택 해제
          if (soundOn) speak('선택 해제했어요', soundOn);
          return;
        }

        const rect = e?.currentTarget?.getBoundingClientRect() || { left: window.innerWidth / 2, top: window.innerHeight / 2, width: 0, height: 0 };
        setFlyItem({ ...opt, x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 });
        setTimeout(() => setFlyItem(null), 1000);
        if (soundOn) { playChime(); setTimeout(() => speak(opt.feedback, soundOn), 350); }
        setPicks(prev => [...prev, { stepTitle: currentStep.title, ...opt }]);
      }, [picks, currentStep, soundOn]);

      /* ── 선택 완료 버튼 클릭 ── */
      const handleDoneSelecting = () => {
        if (picks.length === 0) {
          alert('적어도 하나는 골라주세요!');
          return;
        }
        setShowDone(true);
        setTimeout(() => {
          const newAll = [...myTreasures, ...picks];
          setMyTreasures(newAll);
          setPicks([]);
          setShowDone(false);
          if (stepIdx >= steps.length - 1) {
            setPhase('recording');
          } else {
            setStepIdx(i => i + 1);
            setPhase('stepPopup');
          }
        }, 1500);
      };

      /* ── 녹음 ── */
      const startRec = async () => {
        try {
          let stream = permStreamRef.current;
          if (!stream || stream.getAudioTracks().every(t => t.readyState === 'ended')) {
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            permStreamRef.current = stream;
          }
          const mr = new MediaRecorder(stream);
          mrRef.current = mr; chunksRef.current = [];
          mr.ondataavailable = e => { if (e.data.size > 0) chunksRef.current.push(e.data); };
          mr.onstop = () => {
            const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
            setAudioUrl(URL.createObjectURL(blob));
            const fr = new FileReader();
            fr.readAsDataURL(blob);
            fr.onloadend = () => { setAudioB64(fr.result.split(',')[1]); setRecStep('done'); };
          };
          mr.start(); setRecStep('rec');
        } catch (_) { alert('마이크를 사용할 수 없어요!'); }
      };
      const stopRec = () => { if (mrRef.current?.state !== 'inactive') mrRef.current?.stop(); };

      /* ── 수료증 PNG 다운로드 ── */
      const downloadCert = useCallback(() => {
        const cv = document.createElement('canvas');
        cv.width = 1200; cv.height = 1650;
        const ctx = cv.getContext('2d');

        // 배경
        const grad = ctx.createLinearGradient(0, 0, 0, 1650);
        grad.addColorStop(0, '#FFFBEB'); grad.addColorStop(1, '#FEF3C7');
        ctx.fillStyle = grad; ctx.fillRect(0, 0, 1200, 1650);

        // 보물상자 테두리
        ctx.strokeStyle = '#B45309'; ctx.lineWidth = 28; ctx.strokeRect(28, 28, 1144, 1594);
        ctx.strokeStyle = '#FCD34D'; ctx.lineWidth = 10; ctx.strokeRect(50, 50, 1100, 1550);
        ctx.strokeStyle = '#B45309'; ctx.lineWidth = 5; ctx.strokeRect(68, 68, 1064, 1514);

        // 코너 이모지
        ctx.font = '55px serif'; ctx.textAlign = 'center';
        [[95, 105], [1105, 105], [95, 1600], [1105, 1600]].forEach(([x, y]) => ctx.fillText('🎁', x, y));

        // 타이틀
        ctx.fillStyle = '#78350F'; ctx.font = 'bold 68px sans-serif';
        ctx.fillText('✨ 나만의 보물상자 수료증 ✨', 600, 210);

        // 이름
        ctx.fillStyle = '#B45309'; ctx.font = 'bold 96px sans-serif';
        ctx.fillText(`🎖️  ${student}  🎖️`, 600, 350);

        // 내용
        ctx.fillStyle = '#92400E'; ctx.font = '48px sans-serif';
        ['위 학생은 나만의 보물상자를 채우고', '보물상자 발표를 훌륭히 마쳤으므로', '이 수료증을 드립니다. 🎉'].forEach((l, i) => ctx.fillText(l, 600, 460 + i * 70));

        // 섹션들
        const sections = [
          { label: '💛 내가 좋아하는 것', items: likeItems, y: 670, bg: '#FEFCE8', border: '#FCD34D' },
          { label: '💪 내가 잘하는 것', items: skillItems, y: 970, bg: '#F0FDF4', border: '#86EFAC' },
          { label: '🌟 내가 되고 싶은 사람', items: dreamItems, y: 1270, bg: '#F5F3FF', border: '#C4B5FD' },
        ];
        sections.forEach(sec => {
          // 섹션 배경
          ctx.fillStyle = sec.bg;
          ctx.beginPath(); ctx.roundRect(100, sec.y, 1000, 250, 24); ctx.fill();
          ctx.strokeStyle = sec.border; ctx.lineWidth = 6;
          ctx.beginPath(); ctx.roundRect(100, sec.y, 1000, 250, 24); ctx.stroke();
          // 레이블
          ctx.fillStyle = '#1E293B'; ctx.font = 'bold 44px sans-serif'; ctx.textAlign = 'left';
          ctx.fillText(sec.label, 140, sec.y + 60);
          // 아이템
          ctx.font = '50px sans-serif';
          sec.items.forEach((item, i) => ctx.fillText(`${item.icon} ${item.text}`, 140 + i * 480, sec.y + 160));
          ctx.textAlign = 'center';
        });

        // 날짜
        ctx.fillStyle = '#9CA3AF'; ctx.font = 'bold 38px sans-serif';
        ctx.fillText(new Date().toLocaleDateString('ko-KR'), 600, 1600);

        const a = document.createElement('a');
        a.download = `보물상자수료증_${student}.png`;
        a.href = cv.toDataURL('image/png'); a.click();
      }, [student, likeItems, skillItems, dreamItems]);

      const toggleSound = useCallback(() => setSoundOn(s => !s), []);

      /* ═══════════════════════════════════════════════════
         화면 렌더링
      ═══════════════════════════════════════════════════ */

      /* ── 로딩 ── */
      if (phase === 'loading') return (
        <div className="w-full h-full flex flex-col items-center justify-center gap-5" style={{ background: '#FFFBEB' }}>
          <div className="w-20 h-20 border-8 border-amber-100 border-t-amber-500 rounded-full animate-spin" />
          <p className="txt-2xl font-black text-amber-700 shine">🔑 보물상자 여는 중...</p>
        </div>
      );

      /* ════════════════════════════════
         1. 시작 화면 (이름 + 마이크)
      ════════════════════════════════ */
      if (phase === 'start') return (

          style={{ background: 'linear-gradient(145deg,#fffbeb,#fef9c3)' }}>

          <span className="absolute top-4 left-5 opacity-10 float txt-hero">🎁</span>

          <span className="absolute top-4 right-5 opacity-10 float txt-hero" style={{ animationDelay: '1.5s' }}>🌟</span>
          <span className="absolute bottom-8 left-5 opacity-10 float txt-hero" style={{ animationDelay: '.4s' }}>✨</span>

          <div className="float mb-3"><TreasureBox isOpen={false} size={140} /></div>

          <h1 className="txt-hero font-black text-amber-900 mb-1 text-center">나만의 보물상자 🎁</h1>
          <p className="txt-lg font-bold text-amber-700 mb-4 text-center word-keep">

          <div className="card-amber w-full max-w-sm p-6 shadow-2xl slide-up">

            {soundOn ? '🔊 소리 켜짐' : '🔇 소리 꺼짐'}

        </div>

      /* ════════════════════════════════

      ════════════════════════════════ */
      if (phase === 'intro') return (
        <div className="w-full h-full flex flex-col" style={{ background: '#fffbeb' }}>
          <Header label="🎒 오늘의 활동 안내" soundOn={soundOn} toggleSound={toggleSound} onHome={handleReset} />
          <div className="flex-1 flex flex-col items-center justify-center px-4 py-2 text-center min-h-0 overflow-hidden">

            <h2 className="txt-3xl sm:txt-5xl font-black text-slate-800 mb-4 sm:mb-6 leading-tight word-keep shrink-0">
              나만의 <span className="text-amber-600">보물상자</span>를<br />
              어떻게 채울까요? 🎁
            </h2>

            <div className="flex flex-col gap-3 sm:gap-4 w-full max-w-lg mb-4 sm:mb-6 min-h-0 flex-1 justify-center">
              <div className="slide-up bg-white p-4 sm:p-5 rounded-3xl border-[5px] border-amber-200 shadow-xl flex items-center gap-4 sm:gap-6 shrink-0">
                <span className="emoji-md sm:emoji-lg">🗺️</span>
                <p className="txt-xl sm:txt-3xl font-black text-amber-900 text-left word-keep leading-tight">
                  총 <strong className="text-rose-500 text-2xl sm:text-4xl text-stroke">3단계</strong>의<br />미션이 있어요!
                </p>
              </div>

              <div className="slide-up bg-amber-100 p-4 sm:p-5 rounded-3xl border-[5px] border-amber-300 shadow-xl flex items-center gap-4 sm:gap-6 shrink-0" style={{ animationDelay: '0.2s' }}>
                <span className="emoji-md sm:emoji-lg">🎯</span>
                <p className="txt-xl sm:txt-3xl font-black text-amber-900 text-left word-keep leading-tight">

            </div>

            <button onClick={() => setPhase('concept')}

          </div>
        </div>

      /* ════════════════════════════════

      ════════════════════════════════ */
      if (phase === 'concept') return (
        <div className="w-full h-full flex flex-col" style={{ background: '#fef9c3' }}>

          <div className="flex-1 flex flex-col items-center justify-center px-5 py-4 text-center">
            <h2 className="txt-3xl font-black text-amber-900 mb-2 word-keep">

            </h2>
            <p className="txt-xl font-bold text-amber-700 mb-5">🎁 어떤 보물이 들어있을까요?</p>

            <div className="relative" style={{ height: '260px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              {/* 열린 후 말풍선 */}
              {isBoxOpen && (
                <div className="pop-in absolute bg-white rounded-3xl border-8 border-amber-400 px-6 py-4 shadow-2xl z-20 w-72 text-center"
                  style={{ bottom: 'calc(100% + 12px)', left: '50%', transform: 'translateX(-50%)' }}>
                  <p className="emoji-md mb-1">🪞</p>
                  <p className="txt-xl font-black text-amber-800 leading-snug word-keep">
                    세상에서 가장 귀한<br />보물은 바로 <span className="text-amber-600 txt-2xl">'나'</span> 야!
                  </p>
                  <p className="txt-lg font-bold text-amber-500 mt-1">💎✨🌟💛🎁</p>
                </div>
              )}
              {/* 보물상자 */}
              <div className="cursor-pointer" onClick={() => { setIsBoxOpen(true); if (soundOn) speak('세상에서 가장 귀한 보물은 바로 나야!', true); }}>
                <TreasureBox isOpen={isBoxOpen} size={200} />
              </div>
            </div>

            {!isBoxOpen && (
              <p className="txt-xl font-black text-amber-600 shine mt-3">👆 상자를 눌러보세요!</p>
            )}
            {isBoxOpen && (
              <button onClick={() => { setIsBoxOpen(false); setPhase('stepPopup'); }}
                className="btn pop-in mt-4 w-full max-w-sm py-5 bg-amber-600 text-white rounded-2xl font-black txt-3xl shadow-xl hover:bg-amber-700">
                내 보물 찾으러 가기! ➡️
              </button>
            )}
          </div>
        </div>
      );

      /* ════════════════════════════════
         4. 단계 팝업 (왜/무엇 설명)
      ════════════════════════════════ */
      if (phase === 'stepPopup') {
        const colors = [
          { bg: '#FEF9C3', badgeBg: '#D97706', badgeText: 'white', headText: '#78350F', border: '#FCD34D', emoji: '💛' },
          { bg: '#D1FAE5', badgeBg: '#059669', badgeText: 'white', headText: '#064E3B', border: '#6EE7B7', emoji: '💪' },
          { bg: '#EDE9FE', badgeBg: '#7C3AED', badgeText: 'white', headText: '#3B0764', border: '#C4B5FD', emoji: '🌟' },
        ];
        const c = colors[stepIdx] || colors[0];
        return (
          <div className="w-full h-full flex flex-col items-center justify-center px-4 py-4 text-center cursor-pointer"
            style={{ background: c.bg }} onClick={() => setPhase('activity')}>
            <div className="pop-in font-black px-6 py-2 rounded-full txt-lg mb-3 shadow-lg"
              style={{ background: c.badgeBg, color: c.badgeText }}>
              {c.emoji} {stepIdx + 1}단계 / {steps.length}단계
            </div>
            <div className="bg-white/95 rounded-3xl px-6 py-4 max-w-lg w-full shadow-2xl pop-in border-4"
              style={{ animationDelay: '.08s', borderColor: c.border }}>
              <p className="txt-base font-black text-slate-500 mb-1">🎯 지금 할 활동</p>
              <h1 className="txt-3xl sm:txt-4xl font-black mb-2 leading-tight word-keep" style={{ color: c.headText }}>
                {currentStep?.title}
              </h1>
              <div className="bg-white rounded-3xl px-5 py-4 txt-xl sm:txt-2xl font-black text-slate-700 mb-4 word-keep shadow-sm border-[4px]" style={{ borderColor: c.border }}>
                <p className="text-xl sm:text-2xl text-rose-500 mb-2 font-black border-b-2 pb-2">
                  💡 "{currentStep?.desc}"
                </p>
                🎯 나를 가장 잘 아는 것이 중요해요!<br />
                <span className="text-rose-500 text-3xl sm:text-4xl">나의 보물을 <u className="underline-offset-4">모두</u> 골라봐요!</span>
              </div>
              <p className="txt-xl sm:txt-2xl font-black text-amber-600 animate-bounce mt-2">👆 화면을 눌러서 시작해요!</p>
            </div>
          </div>
        );
      }

      /* ════════════════════════════════
         5. 메인 활동 (보물 선택)
      ════════════════════════════════ */
      if (phase === 'activity') {
        const stepColors = [
          { headerBg: '#FEF9C3', badgeBg: '#D97706', selBg: '#F59E0B', border: '#FCD34D' },
          { headerBg: '#D1FAE5', badgeBg: '#059669', selBg: '#10B981', border: '#6EE7B7' },
          { headerBg: '#EDE9FE', badgeBg: '#7C3AED', selBg: '#8B5CF6', border: '#C4B5FD' },
        ];
        const sc = stepColors[stepIdx] || stepColors[0];
        const allOptions = currentStep?.options || [];

        return (
          <div className="w-full h-full flex flex-col" style={{ background: '#FAFAF9' }}>
            {/* ─ 상단 헤더 (한 줄로 압축) ─ */}
            <div className="flex items-center justify-between px-3 py-2 shrink-0 border-b-4"
              style={{ background: sc.headerBg, borderColor: sc.border }}>
              <button onClick={handleReset} className="btn w-10 h-10 bg-white rounded-xl border-2 border-slate-200 flex items-center justify-center text-slate-400 shadow-sm">
                <HomeIcon />
              </button>
              <div className="flex flex-col items-center gap-0.5">
                <span className="font-black txt-lg" style={{ color: sc.badgeBg }}>
                  {stepIdx + 1}단계: {currentStep?.title}
                </span>
                <span className="font-black txt-base text-white px-3 py-0.5 rounded-full" style={{ background: sc.badgeBg }}>
                  💎 수집한 보물: {picks.length}개 &nbsp;|&nbsp; ✅ 자유롭게 골라요!
                </span>
              </div>
              <button onClick={toggleSound} className={`btn w-10 h-10 rounded-xl border-2 txt-base px-2 ${soundOn ? 'border-amber-300' : 'border-slate-200'}`}
                style={{ background: soundOn ? sc.headerBg : '#fff' }}>
                {soundOn ? '🔊' : '🔇'}
              </button>

            <div className="flex items-center justify-center px-3 py-2 shrink-0 border-b-2" style={{ background: sc.headerBg, borderColor: sc.border }}>
              <span className="txt-xl sm:txt-2xl font-black text-center word-keep text-amber-900 border-2 border-white/50 bg-white/40 px-4 py-1 rounded-full shadow-sm">

            </div>

            {/* ─ 날아가는 아이템 ─ */}
            {flyItem && (
              <div className="fixed pointer-events-none z-50 emoji-md"
                style={{ left: flyItem.x, top: flyItem.y, animation: 'fly-up 0.9s ease forwards' }}>
                {flyItem.icon}
              </div>
            )}
            {/* ─ 완료 오버레이 ─ */}
            {showDone && (
              <div className="fixed inset-0 flex items-center justify-center z-40 pointer-events-none">
                <div className="pop-in bg-amber-500 text-white px-8 py-6 rounded-3xl shadow-2xl txt-3xl sm:txt-4xl font-black text-center leading-tight">
                  🎉 다 골랐어요!<br />
                  <span className="txt-xl sm:txt-2xl mt-2 block opacity-90">
                    {stepIdx >= steps.length - 1 ? '나만의 보물상자를 발표해볼까요? 🎤' : '다음 보물을 찾으러 가봐요...'}
                  </span>
                </div>
              </div>
            )}
          </div>
        );
      }

      /* ════════════════════════════════
         6. 발표 녹음 화면 (신규!)
      ════════════════════════════════ */
      if (phase === 'recording') {
        return (
          <div className="w-full h-full flex flex-col" style={{ background: 'linear-gradient(145deg,#fffbeb,#fef9c3)' }}>
            <Header label="🎤 나만의 보물상자 발표!" soundOn={soundOn} toggleSound={toggleSound} onHome={handleReset} />
            <div className="flex-1 flex flex-col px-4 py-2 gap-2 overflow-hidden">
              <h2 className="txt-xl font-black text-amber-800 text-center shrink-0">
                🌟 나만의 보물상자를 발표해볼까요?
              </h2>

              {/* 발표 원고 */}
              <div className="card-amber px-4 py-3 flex-1 min-h-0 overflow-hidden flex flex-col">
                <p className="txt-base font-black text-amber-700 mb-1.5 shrink-0">📄 발표 원고 (이렇게 읽어봐요!)</p>
                <div className="bg-amber-50 rounded-2xl px-4 py-3 txt-lg font-bold text-slate-700 leading-relaxed word-keep flex-1 overflow-auto">
                  <p>👋 안녕하세요! 저는 <strong className="text-amber-700">{student}</strong>이에요.</p>
                  <p>💛 제가 좋아하는 것은 <strong className="text-amber-600">{likeItems.map(t => `${t.icon}${t.text}`).join(', ')}</strong>이에요.</p>
                  <p>💪 제가 잘하는 것은 <strong className="text-emerald-600">{skillItems.map(t => `${t.icon}${t.text}`).join(', ')}</strong>이에요.</p>
                  <p>🌟 저는 앞으로 <strong className="text-purple-600">{dreamItems.map(t => `${t.icon}${t.text}`).join(', ')}</strong>이/가 되고 싶어요!</p>
                  <p className="mt-2 pt-2 border-t-2 border-dashed border-amber-300 text-slate-700 txt-lg font-black word-keep">
                    🤝 <em>"친구들의 보물상자 발표를 듣고 소중한 친구들의 보물상자도 함께 살펴보겠습니다. 감사합니다!"</em>
                  </p>
                </div>
              </div>

              {/* 녹음 컨트롤 */}
              <div className="card-amber px-4 py-3 shrink-0">
                {recStep === 'idle' && (
                  <button onClick={startRec}
                    className="btn pulse-amber w-full py-4 bg-rose-500 text-white rounded-2xl font-black txt-3xl shadow-xl">
                    🔴 녹음 시작!
                  </button>
                )}
                {recStep === 'rec' && (
                  <div className="flex flex-col gap-2">
                    <p className="txt-xl font-black text-rose-500 animate-pulse text-center">🔴 녹음 중... 발표해보세요!</p>
                    <button onClick={stopRec}
                      className="btn w-full py-3 bg-slate-800 text-white rounded-2xl font-black txt-2xl shadow-xl">
                      ⏹ 다 말했어요!
                    </button>
                  </div>
                )}
                {recStep === 'done' && (
                  <div className="flex flex-col gap-2">
                    <p className="txt-lg font-black text-emerald-600 text-center">✅ 녹음 완료! 내 목소리를 들어봐요 👂</p>
                    {audioUrl && <audio controls src={audioUrl} className="w-full rounded-xl" style={{ height: '44px' }} />}
                    <div className="flex gap-3">
                      <button onClick={() => { setRecStep('idle'); setAudioUrl(null); setAudioB64(null); }}
                        className="btn flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-bold txt-lg">
                        🔄 다시하기
                      </button>
                      <button onClick={() => { setSaved(true); setPhase('report'); }}
                        className="btn flex-[2] py-3 bg-amber-500 text-white rounded-2xl font-black txt-xl shadow-xl hover:bg-amber-600">
                        🏆 수료증 받기!
                      </button>
                    </div>
                  </div>
                )}
              </div>

              {recStep !== 'rec' && (
                <button onClick={() => setPhase('report')}
                  className="btn shrink-0 text-slate-400 underline font-bold txt-base text-center">
                  말하기가 쑥스러우면 넘어가도 돼요
                </button>
              )}
            </div>
          </div>
        );
      }

      /* ════════════════════════════════
         7. 수료증 화면
      ════════════════════════════════ */
      if (phase === 'report') {
        const CategoryCard = ({ emoji, label, items, bg, border, textColor }) => (
          <div className="flex-1 rounded-3xl p-3 sm:p-4 border-4 shadow-lg flex flex-col min-h-0" style={{ background: bg, borderColor: border }}>
            <p className="txt-lg sm:txt-xl font-black text-center mb-2 shrink-0" style={{ color: textColor }}>{emoji} {label}</p>
            <div className="flex flex-col gap-2 flex-1 justify-center min-h-0">
              {items.map((item, i) => (
                <div key={i} className="flex items-center gap-2 bg-white/80 rounded-2xl px-3 py-2 shadow-sm shrink-0">
                  <span className="emoji-sm sm:emoji-md">{item.icon}</span>
                  <span className="txt-lg sm:txt-xl font-black text-slate-800 word-keep">{item.text}</span>
                </div>
              ))}
            </div>
          </div>
        );

        return (
          <div className="w-full h-full flex flex-col" style={{ background: 'linear-gradient(145deg,#fffbeb,#fef3c7)' }}>
            {saving && (
              <div className="absolute inset-0 bg-white/80 flex items-center justify-center z-50 rounded-[2.5rem]">
                <div className="w-16 h-16 border-4 border-amber-100 border-t-amber-500 rounded-full animate-spin" />
              </div>
            )}

            {/* 헤더 */}
            <div className="flex items-center justify-between px-5 py-3 shrink-0">
              <h1 className="txt-3xl font-black text-amber-900">🏆 보물상자 완성!</h1>
              <button onClick={toggleSound}
                className={`btn w-14 h-14 rounded-2xl border-2 shadow-sm txt-xl ${soundOn ? 'bg-amber-100 text-amber-600 border-amber-300' : 'bg-white text-slate-300 border-slate-100'}`}>
                {soundOn ? '🔊' : '🔇'}
              </button>
            </div>

            {/* 수료증 (보물상자 테두리) */}
            <div className="flex-1 mx-4 mb-2 treasure-border overflow-hidden flex flex-col">
              {/* 금색 타이틀 바 */}
              <div className="text-center py-3 shrink-0" style={{ background: 'linear-gradient(90deg,#FCD34D,#F59E0B,#FCD34D)' }}>
                <p className="txt-xl font-black text-amber-900">✨ 나만의 보물상자 수료증 ✨</p>
                <p className="txt-lg font-black text-amber-800">🎖️ {student} 학생, 정말 멋져요! 🎖️</p>
              </div>

              {/* 3열 카드 */}
              <div className="flex-1 flex gap-3 p-4 min-h-0">
                <CategoryCard emoji="💛" label="내가 좋아하는 것" items={likeItems} bg="#FFFBEB" border="#FCD34D" textColor="#92400E" />
                <CategoryCard emoji="💪" label="내가 잘하는 것" items={skillItems} bg="#F0FDF4" border="#86EFAC" textColor="#065F46" />
                <CategoryCard emoji="🌟" label="내가 되고 싶은 사람" items={dreamItems} bg="#F5F3FF" border="#C4B5FD" textColor="#4C1D95" />
              </div>

              {/* 하단 장식 */}
              <div className="text-center py-2 shrink-0 border-t-4 border-amber-300">
                <p className="txt-base font-bold text-amber-700">
                  🎁💎🌟✨🎊🎉🎈🏆🌈💛🎭🥰💪🌳🌈🏆🎈🎉🎊✨🌟💎🎁
                </p>
                <p className="txt-sm font-bold text-amber-600">{new Date().toLocaleDateString('ko-KR')}</p>
              </div>
            </div>

            {/* 버튼 */}
            <div className="flex gap-3 px-4 pb-4 shrink-0">
              <button onClick={downloadCert}
                className="btn flex-1 py-4 bg-amber-600 text-white rounded-2xl font-black txt-xl shadow-xl hover:bg-amber-700">
                🖼️ 수료증 저장
              </button>
              <button onClick={handleReset}
                className="btn flex-1 py-4 bg-slate-700 text-white rounded-2xl font-black txt-xl shadow-xl hover:bg-slate-800">
                🏠 처음으로
              </button>
            </div>
          </div>
        );
      }

      return null;
    };

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>

</html>
